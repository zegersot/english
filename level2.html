<!DOCTYPE html>

<style>
:root{--bg:#F5F0E8;--sf:#FFF;--p:#4A6FA5;--pl:#E8EFF8;--pd:#365A8A;--ac:#E8856C;--al:#FDF0EC;--gd:#D4A650;--gl:#FDF6E3;--tx:#2D2926;--tm:#5A524C;--tl:#8A837D;--ok:#6BAF7E;--okl:#EDF7EF;--bd:#D96B6B;--r:16px;--rs:10px;--rl:24px;--sh:0 2px 12px rgba(45,41,38,.08);--shl:0 8px 32px rgba(45,41,38,.12);--tr:.3s cubic-bezier(.4,0,.2,1)}

.qo:hover{border-color:var(--p)}.qo.corr{border-color:var(--ok);background:var(--okl);color:var(--ok)}.qo.wro{border-color:var(--bd);background:#FDECEC}.qo.dis{pointer-events:none}

<body>
<div id="app">
  <header class="hdr">
    <button class="hb" id="backBtn" style="visibility:hidden" onclick="goBack()">←</button>
    <h1>✏️ Writing & Words</h1>
    <div style="display:flex;align-items:center;gap:5px">
      <span class="stars-badge" id="starsBadge">⭐ 0</span>
      <button class="hb" id="sndBtn" onclick="toggleSound()">🔊</button>
    </div>
  </header>
  <main class="mc" id="mc"></main>
</div>
<div class="bn2"><div class="ni">
  <button class="nv active" onclick="navTo('home')" data-nav="home"><span class="ni2">🏠</span>خانه</button>
  <button class="nv" onclick="navTo('letters')" data-nav="letters"><span class="ni2">✏️</span>نوشتن</button>
  <button class="nv" onclick="navTo('vocab')" data-nav="vocab"><span class="ni2">📚</span>لغات</button>
  <button class="nv" onclick="navTo('spelling')" data-nav="spelling"><span class="ni2">🧩</span>بازی</button>
  <button class="nv" onclick="navTo('stories')" data-nav="stories"><span class="ni2">📖</span>داستان</button>
  <button class="nv" onclick="window.location.href='index.html'"><span class="ni2">⬇️</span>Level 1</button>
</div></div>
<div class="ro" id="ro"><div class="rc" id="rc2"></div></div>

<script>
// ==================== AUDIO — SpeechSynthesis ====================
var speechRate=0.85,engVoice=null;

function loadVoices(){
  try{
    var v=speechSynthesis.getVoices();
    if(!v||!v.length)return;
    engVoice=null;
    var names=['Google US English','Google UK English Female','Samantha','Daniel','Karen','Alex','en-US','en-GB'];
    for(var p=0;p<names.length;p++){
      for(var i=0;i<v.length;i++){
        if(v[i].name===names[p]||v[i].voiceURI===names[p]){engVoice=v[i];return}
      }
    }
    for(var i=0;i<v.length;i++){if(v[i].lang==='en-US'){engVoice=v[i];return}}
    for(var i=0;i<v.length;i++){if(v[i].lang==='en-GB'){engVoice=v[i];return}}
    for(var i=0;i<v.length;i++){if(v[i].lang.indexOf('en')===0){engVoice=v[i];return}}
  }catch(e){}
}

if(typeof speechSynthesis!=='undefined'){
  speechSynthesis.onvoiceschanged=loadVoices;
  loadVoices();
  setTimeout(loadVoices,200);
  setTimeout(loadVoices,500);
  setTimeout(loadVoices,1000);
  setTimeout(loadVoices,2000);
}

function speak(text,rate){
  if(!state.soundOn||!text||!text.trim())return;
  try{speechSynthesis.cancel()}catch(e){}
  setTimeout(function(){
    try{
      var u=new SpeechSynthesisUtterance(text);
      u.lang='en-US';
      u.rate=rate||speechRate;
      u.pitch=1.0;
      u.volume=1.0;
      if(engVoice)u.voice=engVoice;
      speechSynthesis.speak(u);
    }catch(e){}
  },150);
}

// ==================== STARS & LEVELS ====================
function addStars(n){state.stars=(state.stars||0)+n;save();updateStars();var ms=[10,25,50,100,200,500];for(var i=0;i<ms.length;i++){if(state.stars>=ms[i]&&(state.stars-n)<ms[i]){showReward(ms[i]);break}}}
function updateStars(){var el=document.getElementById('starsBadge');if(el)el.textContent='⭐ '+(state.stars||0)}
function showReward(c){var el=document.getElementById('rc2');el.innerHTML='<div class="rs">🌟</div><h3>آفرین!</h3><p>'+c+' ستاره!</p><button class="btn bp bl" style="width:100%" onclick="document.getElementById(\'ro\').classList.remove(\'show\')">ادامه</button>';document.getElementById('ro').classList.add('show')}

else if(mode==='first'){for(var i=0;i<cnt;i++){var w=ws[i].w,c=w[0],opts=[c];while(opts.length<4){var r='abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random()*26)];if(opts.indexOf(r)<0)opts.push(r)}opts=shuf(opts);qs.push({t:'f',w:w,e:ws[i].e,f:ws[i].f,opts:opts,ci:opts.indexOf(c)})}}
else if(mode==='emoji'){for(var i=0;i<cnt;i++){var opts=[ws[i].w];var pool=shuf(SW.filter(function(x){return x.w!==ws[i].w})).slice(0,3);for(var j=0;j<pool.length;j++)opts.push(pool[j].w);opts=shuf(opts);qs.push({t:'e',w:ws[i].w,e:ws[i].e,f:ws[i].f,opts:opts,ci:opts.indexOf(ws[i].w)})}}
else if(mode==='sound'){for(var i=0;i<cnt;i++){var opts=[{w:ws[i].w,e:ws[i].e}];var pool=shuf(SW.filter(function(x){return x.w!==ws[i].w})).slice(0,3);for(var j=0;j<pool.length;j++)opts.push({w:pool[j].w,e:pool[j].e});opts=shuf(opts);var ci=-1;for(var j=0;j<opts.length;j++)if(opts[j].w===ws[i].w)ci=j;qs.push({t:'s',w:ws[i].w,e:ws[i].e,f:ws[i].f,opts:opts,ci:ci})}}
else if(mode==='scramble'){var good=SW.filter(function(x){return x.w.length>=3&&x.w.length<=6});good=shuf(good).slice(0,10);for(var i=0;i<good.length;i++){var w=good[i],letters=w.w.split(''),scram=shuf(letters),att=0;while(scram.join('')===w.w&&att<20){scram=shuf(letters);att++}var opts=[w.w];var pool=shuf(SW.filter(function(x){return x.w!==w.w})).slice(0,3);for(var j=0;j<pool.length;j++)opts.push(pool[j].w);opts=shuf(opts);qs.push({t:'r',w:w.w,e:w.e,f:w.f,scram:scram,opts:opts,ci:opts.indexOf(w.w)})}}
else if(mode==='odd'){var pairs=[];for(var a=0;a<CATS.length;a++)for(var b=0;b<CATS.length;b++)if(a!==b&&CATS[a].words.length>=3)pairs.push([a,b]);pairs=shuf(pairs).slice(0,10);for(var p=0;p<pairs.length;p++){var mc=CATS[pairs[p][0]],oc=CATS[pairs[p][1]];var mw=shuf(mc.words).slice(0,3),ow=oc.words[Math.floor(Math.random()*oc.words.length)];var opts=[{w:mw[0].w,e:mw[0].e},{w:mw[1].w,e:mw[1].e},{w:mw[2].w,e:mw[2].e},{w:ow.w,e:ow.e,odd:true}];opts=shuf(opts);var ci=-1;for(var k=0;k<opts.length;k++)if(opts[k].odd){ci=k;break}qs.push({t:'o',opts:opts,ci:ci,mainCat:mc.t})}}
state.quizState={mode:mode,qs:qs,qi:0,sc:0,ans:[],locked:false};state.gameView='quiz';render()}
function renderQuizQ(){var ss=state.quizState;if(!ss)return'';if(ss.qi>=ss.qs.length)return showQResult();var q=ss.qs[ss.qi],dots='';for(var i=0;i<ss.qs.length;i++){var c='spd';if(i===ss.qi)c+=' cur';else if(i<ss.qi)c+=ss.ans[i]?' ok2':' fl';dots+='<div class="'+c+'"></div>'}var hd='<div class="sptb"><button class="btn bs sm" onclick="cancelG()">←</button><span style="font-size:.72rem;color:var(--tl)">'+(ss.qi+1)+'/'+ss.qs.length+'</span></div>';var main='';
if(q.t==='m'){var wh='';for(var i=0;i<q.w.length;i++)wh+=(i===q.bi)?'<div class="spch blank">?</div>':'<div class="spch">'+q.w[i]+'</div>';var oh='';for(var i=0;i<q.opts.length;i++)oh+='<button class="spopt" data-i="'+i+'" onclick="ansQ('+i+')">'+q.opts[i]+'</button>';main='<div class="spemoji">'+q.e+'</div><div style="font-size:.72rem;color:var(--tm);margin-bottom:5px">'+q.f+'</div><div class="spword">'+wh+'</div><div class="spopts">'+oh+'</div>'}
else if(q.t==='h'){var oh='';for(var i=0;i<q.opts.length;i++)oh+='<button class="spopt" data-i="'+i+'" onclick="ansQ('+i+')" style="font-size:.85rem;padding:10px 14px">'+q.opts[i].w+'</button>';main='<button class="wpb" onclick="speak(\''+q.w+'\')">🔊</button><div style="font-size:.68rem;color:var(--tl);margin-bottom:5px">بشنو و بگو</div><div class="spopts">'+oh+'</div>'}
else if(q.t==='f'){var oh='';for(var i=0;i<q.opts.length;i++)oh+='<button class="spopt" data-i="'+i+'" onclick="ansQ('+i+')">'+q.opts[i]+'</button>';main='<div class="spemoji">'+q.e+'</div><div style="font-size:.72rem;color:var(--tm);margin-bottom:3px">'+q.f+'</div><div style="font-size:1.4rem;font-weight:900;color:var(--tl);margin-bottom:5px;letter-spacing:3px">? '+q.w.slice(1)+'</div><div style="font-size:.68rem;color:var(--tm);margin-bottom:5px">حرف اول؟</div><div class="spopts">'+oh+'</div>'}
else if(q.t==='e'){var oh='';for(var i=0;i<q.opts.length;i++)oh+='<button class="spopt" data-i="'+i+'" onclick="ansQ('+i+')" style="font-size:.88rem;padding:10px 14px">'+q.opts[i]+'</button>';main='<div class="spemoji" style="font-size:3.5rem">'+q.e+'</div><div style="font-size:.82rem;color:var(--tm);margin-bottom:10px">این چیه؟</div><div class="spopts">'+oh+'</div>'}
else if(q.t==='s'){var oh='';for(var i=0;i<q.opts.length;i++)oh+='<button class="spopt" data-i="'+i+'" onclick="ansQ('+i+')" style="font-size:2rem;padding:12px 16px">'+q.opts[i].e+'</button>';main='<button class="wpb" onclick="speak(\''+q.w+'\')">🔊</button><div style="font-size:.72rem;color:var(--tm);margin-bottom:8px">بشنو و شکلک رو بزن</div><div class="spopts">'+oh+'</div>'}
else if(q.t==='r'){var sh='';for(var i=0;i<q.scram.length;i++)sh+='<span class="scramble-letter">'+q.scram[i]+'</span>';var oh='';for(var i=0;i<q.opts.length;i++)oh+='<button class="spopt" data-i="'+i+'" onclick="ansQ('+i+')" style="font-size:.88rem;padding:10px 14px">'+q.opts[i]+'</button>';main='<div class="spemoji">'+q.e+'</div><div style="font-size:.72rem;color:var(--tm);margin-bottom:3px">'+q.f+'</div><div class="scramble-letters">'+sh+'</div><div style="font-size:.68rem;color:var(--tm);margin-bottom:5px">کلمه درست رو انتخاب کن</div><div class="spopts">'+oh+'</div>'}
else if(q.t==='o'){var oh='';for(var i=0;i<q.opts.length;i++)oh+='<button class="odd-btn" data-i="'+i+'" onclick="ansQ('+i+')"><span class="ob-e">'+q.opts[i].e+'</span><span class="ob-w">'+q.opts[i].w+'</span></button>';main='<div style="font-size:1.5rem;margin-bottom:3px">🤔</div><div style="font-size:.85rem;font-weight:700;color:var(--tm);margin-bottom:8px">کدوم فرق داره؟ ('+q.mainCat+')</div><div class="odd-grid">'+oh+'</div>'}
return hd+'<div class="spc"><div class="spprog">'+dots+'</div>'+main+'</div>'}
function ansQ(idx){var ss=state.quizState;if(!ss||ss.locked)return;ss.locked=true;var q=ss.qs[ss.qi];var ok=idx===q.ci;ss.ans.push(ok);if(ok){ss.sc++;addStars(1)}
if(q.t==='o'){var btns=document.querySelectorAll('.odd-btn');for(var i=0;i<btns.length;i++){var bi=parseInt(btns[i].getAttribute('data-i'));btns[i].classList.add('dis');if(bi===q.ci)btns[i].classList.add('ok');if(bi===idx&&!ok)btns[i].classList.add('bad')}}else{var btns=document.querySelectorAll('.spopt');for(var i=0;i<btns.length;i++){var bi=parseInt(btns[i].getAttribute('data-i'));btns[i].classList.add('dis');if(bi===q.ci)btns[i].classList.add('ok');if(bi===idx&&!ok)btns[i].classList.add('bad')}}
if(!ok)speak(q.w);setTimeout(function(){ss.qi++;ss.locked=false;render()},1200)}
function showQResult(){var ss=state.quizState;if(!ss)return'';var sc=ss.sc,total=ss.qs.length,pct=Math.round(sc/total*100);var key='q'+ss.mode.charAt(0);if(sc>(state.progress[key]||0)){state.progress[key]=sc;save()}state.lastResult={type:'quiz',mode:ss.mode,score:sc,total:total,pct:pct};state.quizState=null;state.gameView='result';return renderResult()}
function startMem(){var ws=shuf(SW).slice(0,8);var cards=[];for(var i=0;i<ws.length;i++){cards.push({id:i,type:'e',display:ws[i].e,word:ws[i].w});cards.push({id:i,type:'w',display:ws[i].w,word:ws[i].w})}cards=shuf(cards);state.memState={cards:cards,flipped:[],matched:[],moves:0,pairs:ws.length,locked:false};state.quizState=null;state.gameView='memory';render()}
function renderMemQ(){var ms=state.memState;if(!ms)return'';if(ms.matched.length===ms.pairs)return showMemResult();var h='<div class="sptb"><button class="btn bs sm" onclick="cancelG()">←</button><span style="font-size:.72rem;color:var(--tl)">جفت: '+ms.matched.length+'/'+ms.pairs+' | حرکت: '+ms.moves+'</span></div>';h+='<div style="font-size:.82rem;font-weight:700;color:var(--tm);margin-bottom:8px;text-align:center">🔍 شکلک و کلمه رو جفت کن</div><div class="mem-grid">';for(var i=0;i<ms.cards.length;i++){var card=ms.cards[i],isF=ms.flipped.indexOf(i)>=0,isM=ms.matched.indexOf(card.id)>=0;if(isM)h+='<div class="mem-card matched">'+card.display+'</div>';else if(isF)h+='<div class="mem-card flipped">'+card.display+'</div>';else h+='<div class="mem-card down" onclick="flipC('+i+')">❓</div>'}h+='</div>';return h}
function flipC(idx){var ms=state.memState;if(!ms||ms.locked)return;if(ms.flipped.indexOf(idx)>=0)return;if(ms.matched.indexOf(ms.cards[idx].id)>=0)return;if(ms.flipped.length>=2)return;ms.flipped.push(idx);if(ms.flipped.length===2){ms.moves++;var c1=ms.cards[ms.flipped[0]],c2=ms.cards[ms.flipped[1]];if(c1.id===c2.id&&c1.type!==c2.type){ms.matched.push(c1.id);ms.flipped=[];addStars(1);speak(c1.word);if(ms.matched.length===ms.pairs){ms.locked=true;setTimeout(function(){render()},1000)}}else{ms.locked=true;render();setTimeout(function(){ms.flipped=[];ms.locked=false;render()},1000)}}render()}
function showMemResult(){var ms=state.memState;if(!ms)return'';var best=state.progress.mb;if(!best||ms.moves<best){state.progress.mb=ms.moves;save()}state.lastResult={type:'memory',score:ms.pairs,total:ms.pairs,pct:100,moves:ms.moves};state.memState=null;state.gameView='result';return renderResult()}
function startWB(){var good=SW.filter(function(x){return x.w.length>=3&&x.w.length<=5});good=shuf(good).slice(0,10);var qs=[];for(var i=0;i<good.length;i++){var w=good[i].w,letters=w.split(''),scram=shuf(letters),att=0;while(scram.join('')===w&&att<20){scram=shuf(letters);att++}if(w.length>=4){var decoy;do{decoy='abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random()*26)]}while(w.indexOf(decoy)>=0);scram.push(decoy);scram=shuf(scram)}qs.push({w:w,e:good[i].e,f:good[i].f,letters:scram})}var a=[];for(var i=0;i<qs[0].w.length;i++)a.push(-1);var u=[];for(var i=0;i<qs[0].letters.length;i++)u.push(false);state.wbState={qs:qs,qi:0,sc:0,ans:[],answer:a,used:u,locked:false,wrong:false};state.quizState=null;state.gameView='wb';render()}
function initWBQ(){var wb=state.wbState,q=wb.qs[wb.qi];wb.answer=[];for(var i=0;i<q.w.length;i++)wb.answer.push(-1);wb.used=[];for(var i=0;i<q.letters.length;i++)wb.used.push(false);wb.wrong=false}
function renderWBQ(){var wb=state.wbState;if(!wb)return'';if(wb.qi>=wb.qs.length)return showWBResult();var q=wb.qs[wb.qi],dots='';for(var i=0;i<wb.qs.length;i++){var c='spd';if(i===wb.qi)c+=' cur';else if(i<wb.qi)c+=wb.ans[i]?' ok2':' fl';dots+='<div class="'+c+'"></div>'}var slots='';for(var i=0;i<q.w.length;i++){if(wb.answer[i]>=0){var letter=q.letters[wb.answer[i]],cls='wb-slot filled';if(wb.wrong)cls+=' wrong';slots+='<div class="'+cls+'" onclick="wbRem('+i+')">'+letter+'</div>'}else slots+='<div class="wb-slot">?</div>'}var lets='';for(var i=0;i<q.letters.length;i++){var cls='wb-letter'+(wb.used[i]?' used':'');lets+='<button class="'+cls+'" onclick="wbPl('+i+')">'+q.letters[i]+'</button>'}return'<div class="sptb"><button class="btn bs sm" onclick="cancelG()">←</button><span style="font-size:.72rem;color:var(--tl)">'+(wb.qi+1)+'/'+wb.qs.length+'</span></div><div class="spc"><div class="spprog">'+dots+'</div><div class="spemoji">'+q.e+'</div><div style="font-size:.72rem;color:var(--tm);margin-bottom:3px">'+q.f+'</div><div style="font-size:.68rem;color:var(--tm);margin-bottom:10px">حروف رو به ترتیب بزن</div><div class="wb-slots">'+slots+'</div><div class="wb-letters">'+lets+'</div></div>'}
function wbPl(si){var wb=state.wbState;if(!wb||wb.locked||wb.used[si])return;var q=wb.qs[wb.qi],slot=-1;for(var i=0;i<q.w.length;i++)if(wb.answer[i]<0){slot=i;break}if(slot<0)return;wb.answer[slot]=si;wb.used[si]=true;var complete=true;for(var i=0;i<q.w.length;i++)if(wb.answer[i]<0){complete=false;break}if(complete){var word='';for(var i=0;i<q.w.length;i++)word+=q.letters[wb.answer[i]];wb.locked=true;if(word===q.w){wb.sc++;wb.ans.push(true);addStars(1);speak(q.w);setTimeout(function(){wb.qi++;if(wb.qi<wb.qs.length)initWBQ();wb.locked=false;render()},1200)}else{wb.wrong=true;wb.ans.push(false);render();setTimeout(function(){for(var i=0;i<q.w.length;i++)wb.answer[i]=-1;for(var i=0;i<q.letters.length;i++)wb.used[i]=false;wb.locked=false;wb.wrong=false;render()},1200)}}render()}
function wbRem(slot){var wb=state.wbState;if(!wb||wb.locked||wb.answer[slot]<0)return;wb.used[wb.answer[slot]]=false;wb.answer[slot]=-1;render()}
function showWBResult(){var wb=state.wbState;if(!wb)return'';var sc=wb.sc,total=wb.qs.length,pct=Math.round(sc/total*100);if(sc>(state.progress.qwb||0)){state.progress.qwb=sc;save()}state.lastResult={type:'wb',score:sc,total:total,pct:pct};state.wbState=null;state.gameView='result';return renderResult()}
function renderResult(){var r=state.lastResult;if(!r)return renderGameMenu();var pct=r.pct;var emoji=pct>=90?'🌟':pct>=70?'🎉':pct>=50?'👍':'💪';var text=pct>=90?'عالی!':pct>=70?'خیلی خوب!':pct>=50?'آفرین!':'تمرین کن!';var extra=r.type==='memory'?'<div style="font-size:.78rem;color:var(--tm);margin-top:3px">'+r.moves+' حرکت</div>':'';var again='';if(r.type==='quiz')again="startQ('"+r.mode+"')";else if(r.type==='memory')again='startMem()';else if(r.type==='wb')again='startWB()';return'<div class="result-card"><div class="re" style="animation:cl .8s ease">'+emoji+'</div><h3>'+text+'</h3><p>'+r.score+' از '+r.total+' ('+pct+'%)</p>'+extra+'<div class="nb"><button class="btn bp bl" style="flex:1" onclick="'+again+'">🔄 دوباره</button><button class="btn bs bl" style="flex:1" onclick="cancelG()">🎮 بازی‌ها</button></div></div>'}

document.addEventListener('touchstart',function wu(){try{var u=new SpeechSynthesisUtterance('');u.volume=0;u.rate=10;speechSynthesis.speak(u)}catch(e){}document.removeEventListener('touchstart',wu)},{once:true});
document.addEventListener('click',function wu(){try{var u=new SpeechSynthesisUtterance('');u.volume=0;u.rate=10;speechSynthesis.speak(u)}catch(e){}document.removeEventListener('click',wu)},{once:true});
render();updateNav();updateBack();
