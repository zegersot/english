<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Writing & Words — Level 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0E8;--sf:#FFF;--p:#4A6FA5;--pl:#E8EFF8;--pd:#365A8A;--ac:#E8856C;--al:#FDF0EC;--gd:#D4A650;--gl:#FDF6E3;--tx:#2D2926;--tm:#5A524C;--tl:#8A837D;--ok:#6BAF7E;--okl:#EDF7EF;--bd:#D96B6B;--r:16px;--rs:10px;--rl:24px;--sh:0 2px 12px rgba(45,41,38,.08);--shl:0 8px 32px rgba(45,41,38,.12);--tr:.3s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;flex-direction:column;max-width:900px;margin:0 auto}
.hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--sf);border-bottom:1px solid rgba(0,0,0,.05);position:sticky;top:0;z-index:100}
.hdr h1{font-size:.92rem;font-weight:800;background:linear-gradient(135deg,var(--p),var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hb{background:var(--pl);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--tr);font-size:.95rem;color:var(--p)}
.stars-badge{background:var(--gl);color:var(--gd);padding:3px 9px;border-radius:16px;font-size:.72rem;font-weight:800}
.mc{flex:1;padding:12px 12px 100px}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes cl{0%{transform:scale(1)}30%{transform:scale(1.15) rotate(-3deg)}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1)}}
.st{font-size:1rem;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.btn{padding:10px 16px;border-radius:var(--rs);border:none;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;transition:var(--tr);display:inline-flex;align-items:center;gap:5px}
.btn:active{transform:scale(.96)}
.bp{background:var(--p);color:#fff;flex:1;justify-content:center}.bs{background:var(--pl);color:var(--p);flex:1;justify-content:center}
.ba{background:var(--ac);color:#fff;flex:1;justify-content:center}.bg{background:var(--gd);color:#fff;flex:1;justify-content:center}
.bok{background:var(--ok);color:#fff;flex:1;justify-content:center}.bo{background:transparent;color:var(--p);border:2px solid var(--p);flex:1;justify-content:center}
.bl{padding:13px 24px;font-size:.95rem;border-radius:var(--r)}.sm{padding:6px 12px;font-size:.75rem;flex:none}
.nb{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.hh{text-align:center;padding:24px 14px;background:linear-gradient(145deg,var(--pl),var(--al));border-radius:var(--rl);margin-bottom:18px;animation:fi .5s ease}
.hh .eb{font-size:2.6rem;margin-bottom:5px;display:block}.hh h2{font-size:1.2rem;font-weight:900;margin-bottom:3px;color:var(--pd)}.hh p{font-size:.8rem;color:var(--tm);line-height:1.5}
.pg{display:grid;gap:10px}
.pc{background:var(--sf);border-radius:var(--r);padding:13px;box-shadow:var(--sh);cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:10px;border:2px solid transparent}
.pc:active{transform:scale(.98)}
.pi2{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.pinf{flex:1;min-width:0}.pinf h3{font-size:.85rem;font-weight:800;margin-bottom:2px}.pinf p{font-size:.68rem;color:var(--tl)}
.pbar{width:100%;height:4px;background:#eee;border-radius:2px;margin-top:4px;overflow:hidden}.pbf{height:100%;border-radius:2px;transition:width .5s ease}
.pbadge{font-size:.54rem;padding:2px 6px;border-radius:16px;font-weight:700;white-space:nowrap}
/* LEVEL BADGE */
.level-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:.6rem;font-weight:800;margin-left:6px}
.level-1{background:#E8F4F0;color:#3D7B6F}.level-2{background:#E8EFF8;color:#4A6FA5}.level-3{background:#FDF6E3;color:#D4A650}.level-4{background:#FDF0EC;color:#E8856C}.level-5{background:#EDF7EF;color:#6BAF7E}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.sc{background:var(--sf);border-radius:var(--r);padding:11px 5px;text-align:center;box-shadow:var(--sh)}
.sn{font-size:1.2rem;font-weight:900;color:var(--p)}.sl{font-size:.56rem;color:var(--tl);margin-top:2px}
.lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:6px}
.lc{background:var(--sf);border-radius:var(--r);padding:7px 3px;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:var(--tr);border:2px solid transparent;position:relative}
.lc:active{transform:scale(.92)}.lc .lm{font-size:.58rem;color:var(--tl);font-weight:600}.lc .lx{font-size:1.3rem;font-weight:900;color:var(--p);line-height:1.1}
.lc.done{border-color:var(--ok);background:var(--okl)}.lc.done::after{content:'✓';position:absolute;top:1px;right:2px;color:var(--ok);font-weight:800;font-size:.5rem}
.wa{text-align:center;animation:fi .4s ease}
.wex{display:flex;align-items:flex-end;justify-content:center;gap:18px;margin-bottom:5px}
.wex .wu{font-size:3.8rem;font-weight:900;color:var(--p);line-height:1}.wex .wl{font-size:2.8rem;font-weight:900;color:var(--ac);line-height:1;opacity:.8}
.cw{position:relative;width:95%;max-width:380px;margin:0 auto 5px;border-radius:var(--r);overflow:hidden;border:3px solid var(--pl);background:#fff;touch-action:none}
.cwu{height:150px}.cwl{height:110px}.cww{height:130px}.cw canvas{display:block;width:100%;height:100%}
.wc{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.wcb{padding:7px 13px;border-radius:18px;border:2px solid var(--pl);background:#fff;font-family:inherit;font-weight:700;font-size:.75rem;color:var(--p);cursor:pointer;transition:var(--tr)}.wcb:active{transform:scale(.95);background:var(--pl)}
.ws{background:var(--sf);border-radius:var(--r);padding:10px;box-shadow:var(--sh);margin-bottom:10px;text-align:right;direction:rtl}.ws h4{font-size:.75rem;color:var(--tl);margin-bottom:4px;font-weight:700}
.si2{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:.78rem;direction:ltr}
.sn2{width:18px;height:18px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;flex-shrink:0}
.wt2{background:var(--gl);border-radius:var(--rs);padding:7px;font-size:.75rem;color:var(--tm);direction:rtl;margin-bottom:10px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px;margin-bottom:16px}
.cc{background:var(--sf);border-radius:var(--r);padding:13px 7px;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:var(--tr)}.cc:active{transform:scale(.95)}
.cc .ce{font-size:1.7rem;margin-bottom:2px}.cc .cn{font-size:.75rem;font-weight:800}.cc .cd{font-size:.58rem;color:var(--tl)}
.cc .cb{width:100%;height:3px;background:#eee;border-radius:2px;margin-top:4px;overflow:hidden}.cc .cbf{height:100%;border-radius:2px}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px}
.vc{background:var(--sf);border-radius:var(--r);padding:11px 5px;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:var(--tr);border:2px solid transparent;position:relative}
.vc:active{transform:scale(.92)}.vc .ve{font-size:1.8rem;margin-bottom:2px}.vc .vw{font-size:.85rem;font-weight:800}.vc .vf{font-size:.58rem;color:var(--tl);direction:rtl}
.vc.done{border-color:var(--ok);background:var(--okl)}.vc.done::after{content:'✓';position:absolute;top:2px;right:3px;color:var(--ok);font-weight:800;font-size:.5rem}
.wd2{text-align:center;animation:fi .4s ease}
.wpb{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#d06a50);border:none;color:#fff;font-size:1.2rem;cursor:pointer;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}.wpb:active{transform:scale(.88)}
.wps{background:var(--pl);border-radius:var(--rs);padding:8px 11px;font-size:.85rem;color:var(--pd);font-weight:600;margin-bottom:10px;cursor:pointer}.wps:active{background:var(--p);color:#fff}
.sptb{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.spc{background:var(--sf);border-radius:var(--rl);padding:16px 12px;box-shadow:var(--shl);text-align:center;animation:fi .5s ease;margin-bottom:12px}
.spemoji{font-size:2.6rem;margin-bottom:5px}
.spword{font-size:1.5rem;font-weight:900;letter-spacing:3px;margin-bottom:8px;display:flex;justify-content:center;gap:3px;flex-wrap:wrap}
.spch{width:34px;height:42px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;border:2px solid #ddd;background:#fff}
.spch.blank{border-color:var(--p);background:var(--pl)}
.spopts{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px}
.spopt{padding:9px 16px;border-radius:var(--rs);border:2px solid #eee;background:var(--sf);font-family:inherit;font-size:.95rem;font-weight:800;cursor:pointer;transition:var(--tr);min-width:40px}
.spopt:hover{border-color:var(--p);background:var(--pl)}
.spopt.ok{background:var(--ok)!important;color:#fff!important;border-color:var(--ok)!important}
.spopt.bad{background:#FDECEC!important;border-color:var(--bd)!important}
.spopt.dis{pointer-events:none;opacity:.55}
.spprog{display:flex;gap:3px;justify-content:center;margin-bottom:10px}
.spd{width:7px;height:7px;border-radius:50%;background:#ddd}.spd.cur{background:var(--p);transform:scale(1.3)}.spd.ok2{background:var(--ok)}.spd.fl{background:var(--bd)}
.match-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.match-opt{padding:14px;border-radius:var(--r);border:3px solid #eee;background:var(--sf);font-family:inherit;font-size:1rem;font-weight:800;cursor:pointer;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:3px}
.match-opt .mo-e{font-size:1.8rem}.match-opt:active{transform:scale(.95)}.match-opt.correct{border-color:var(--ok);background:var(--okl);animation:cl .6s ease}.match-opt.wrong{border-color:var(--bd);background:#FDECEC}.match-opt.dis{pointer-events:none;opacity:.5}
.strc{background:var(--sf);border-radius:var(--r);padding:13px;box-shadow:var(--sh);margin-bottom:10px;cursor:pointer;transition:var(--tr)}.strc:active{transform:scale(.98)}
.strt{font-size:.88rem;font-weight:800;display:flex;align-items:center;gap:5px;margin-bottom:2px}.strp{font-size:.75rem;color:var(--tm);line-height:1.4}
.strf{background:var(--sf);border-radius:var(--r);padding:16px;box-shadow:var(--sh);animation:fi .4s ease}.strf h3{font-size:1.05rem;font-weight:900;text-align:center;margin-bottom:6px}
.spctrl{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;padding:7px;background:var(--pl);border-radius:var(--rs)}
.spctrl label{font-size:.72rem;font-weight:700;color:var(--p)}.spctrl input[type=range]{width:90px;accent-color:var(--p)}.spctrl span{font-size:.72rem;color:var(--tm);min-width:22px}
.strline{font-size:.95rem;line-height:2;color:var(--tx);margin-bottom:2px;cursor:pointer;padding:3px 6px;border-radius:6px;transition:var(--tr);display:flex;align-items:center;gap:5px}
.strline:hover{background:var(--pl)}.strline .slp{font-size:.85rem;opacity:.35;transition:var(--tr);flex-shrink:0}.strline:hover .slp{opacity:1}
.strq{background:var(--pl);border-radius:var(--r);padding:11px;margin-top:10px;margin-bottom:5px;direction:rtl;text-align:right}.strq h4{font-size:.78rem;color:var(--p);margin-bottom:5px}
.qo{padding:9px;border-radius:var(--rs);border:2px solid #ddd;background:#fff;font-family:inherit;font-size:.78rem;font-weight:600;cursor:pointer;transition:var(--tr);text-align:right;direction:rtl;margin-bottom:4px;display:block;width:100%}
.qo:hover{border-color:var(--p)}.qo.corr{border-color:var(--ok);background:var(--okl);color:var(--ok)}.qo.wro{border-color:var(--bd);background:#FDECEC}.qo.dis{pointer-events:none}
.bn2{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid rgba(0,0,0,.06);padding:5px 0;padding-bottom:max(5px,env(safe-area-inset-bottom));z-index:100}
.bn2 .ni{display:flex;gap:1px;max-width:520px;width:100%;justify-content:space-around;margin:0 auto}
.nv{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 6px;border-radius:10px;background:none;border:none;cursor:pointer;font-family:inherit;transition:var(--tr);color:var(--tl);font-size:.52rem;font-weight:700;min-width:48px}.nv .ni2{font-size:.95rem}.nv.active{color:var(--p);background:var(--pl)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}.mo.show{display:flex}
.md{background:var(--sf);border-radius:var(--rl);padding:22px 16px;max-width:320px;width:100%;text-align:center}.md h3{font-size:1rem;font-weight:800;margin-bottom:5px}.md p{color:var(--tm);margin-bottom:12px;line-height:1.5}
.ro{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:300}.ro.show{display:flex}
.rc{background:var(--sf);border-radius:var(--rl);padding:28px 22px;text-align:center;animation:cl .8s ease;max-width:280px;width:90%}.rc .rs{font-size:3.5rem;margin-bottom:6px}.rc h3{font-size:1.2rem;font-weight:900;margin-bottom:5px}.rc p{color:var(--tm);font-size:.85rem;margin-bottom:14px}
/* PROGRESS DETAIL */
.prog-section{background:var(--sf);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:10px}
.prog-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prog-title{font-size:.88rem;font-weight:800;display:flex;align-items:center;gap:5px}
.prog-pct{font-size:.85rem;font-weight:900;color:var(--p)}
.prog-level{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px}
.prog-bar{width:100%;height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-bottom:4px}
.prog-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.prog-detail{font-size:.65rem;color:var(--tl);display:flex;justify-content:space-between}
@media(min-width:600px){.lg{grid-template-columns:repeat(auto-fill,minmax(70px,1fr))}.vg{grid-template-columns:repeat(auto-fill,minmax(135px,1fr))}.cw{max-width:460px}}
@media(max-width:380px){.lg{grid-template-columns:repeat(5,1fr);gap:5px}.vg{grid-template-columns:repeat(2,1fr)}.wex .wu{font-size:2.8rem}.wex .wl{font-size:2rem}}
</style>
</head>
<body>
<div id="app">
  <header class="hdr">
    <button class="hb" id="backBtn" style="visibility:hidden" onclick="goBack()">←</button>
    <h1>✏️ Writing & Words</h1>
    <div style="display:flex;align-items:center;gap:5px">
      <span class="stars-badge" id="starsBadge">⭐ 0</span>
      <button class="hb" id="sndBtn" onclick="toggleSound()">🔊</button>
    </div>
  </header>
  <main class="mc" id="mc"></main>
</div>
<div class="bn2"><div class="ni">
  <button class="nv active" onclick="navTo('home')" data-nav="home"><span class="ni2">🏠</span>خانه</button>
  <button class="nv" onclick="navTo('letters')" data-nav="letters"><span class="ni2">✏️</span>نوشتن</button>
  <button class="nv" onclick="navTo('vocab')" data-nav="vocab"><span class="ni2">📚</span>لغات</button>
  <button class="nv" onclick="navTo('spelling')" data-nav="spelling"><span class="ni2">🧩</span>بازی</button>
  <button class="nv" onclick="navTo('stories')" data-nav="stories"><span class="ni2">📖</span>داستان</button>
</div></div>
<div class="mo" id="mo"><div class="md" id="md2"></div></div>
<div class="ro" id="ro"><div class="rc" id="rc2"></div></div>

<script>
// ====================================================================
// AUDIO - SINGLE SPEAK, NO DOUBLES
// ====================================================================
var speakTimer = null;
var speechRate = 0.8;
var englishVoice = null;

function loadVoices() {
  try {
    var v = speechSynthesis.getVoices();
    for (var i = 0; i < v.length; i++) {
      if (v[i].lang === 'en-US') { englishVoice = v[i]; return; }
      if (v[i].lang === 'en-GB') { englishVoice = v[i]; }
      if (!englishVoice && v[i].lang.indexOf('en') === 0) { englishVoice = v[i]; }
    }
  } catch(e) {}
}
if (typeof speechSynthesis !== 'undefined') { speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); }

function speak(text, rate) {
  if (!state.soundOn || !text || !text.trim()) return;
  // Cancel any pending speak
  if (speakTimer) { clearTimeout(speakTimer); speakTimer = null; }
  try { speechSynthesis.cancel(); } catch(e) {}
  speakTimer = setTimeout(function() {
    try {
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = rate || speechRate;
      u.pitch = 1.05;
      if (englishVoice) u.voice = englishVoice;
      speechSynthesis.speak(u);
    } catch(e) {}
    speakTimer = null;
  }, 200);
}

// ====================================================================
// STARS & REWARDS
// ====================================================================
function addStars(n) {
  state.stars = (state.stars || 0) + n;
  save();
  updateStars();
  var ms = [10,25,50,100,200,500];
  for (var i = 0; i < ms.length; i++) {
    if (state.stars >= ms[i] && (state.stars - n) < ms[i]) { showReward(ms[i]); break; }
  }
}
function updateStars() { var el = document.getElementById('starsBadge'); if (el) el.textContent = '⭐ ' + (state.stars || 0); }
function showReward(c) { var el = document.getElementById('rc2'); el.innerHTML = '<div class="rs">🌟</div><h3>آفرین!</h3><p>' + c + ' ستاره!</p><button class="btn bp bl" style="width:100%" onclick="hideReward()">ادامه</button>'; document.getElementById('ro').classList.add('show'); }
function hideReward() { document.getElementById('ro').classList.remove('show'); }

// ====================================================================
// LEVEL SYSTEM
// ====================================================================
function getLevel(pct) {
  if (pct >= 90) return {n:5, name:'استاد', cls:'level-5', icon:'🏆'};
  if (pct >= 70) return {n:4, name:'پیشرفته', cls:'level-4', icon:'⭐'};
  if (pct >= 50) return {n:3, name:'متوسط', cls:'level-3', icon:'📈'};
  if (pct >= 25) return {n:2, name:'مبتدی+', cls:'level-2', icon:'📚'};
  if (pct > 0) return {n:1, name:'مبتدی', cls:'level-1', icon:'🌱'};
  return {n:0, name:'شروع نشده', cls:'level-1', icon:'⬜'};
}

function levelBadge(pct) {
  var lv = getLevel(pct);
  return '<span class="level-badge ' + lv.cls + '">' + lv.icon + ' ' + lv.name + '</span>';
}

// ====================================================================
// STATE
// ====================================================================
var state = {
  screen:'home', history:[], selLetter:null, selCat:null, selWord:null,
  selStory:null, storyAns:{}, spellState:null, matchState:null,
  soundOn:true, stars:0,
  progress: JSON.parse(localStorage.getItem('lv2p') || '{}')
};

function save() { localStorage.setItem('lv2p', JSON.stringify(state.progress)); localStorage.setItem('lv2stars', (state.stars||0).toString()); }
state.stars = parseInt(localStorage.getItem('lv2stars') || '0');

function lD(id) { return state.progress['l_'+id] || false; }
function lM(id) { state.progress['l_'+id] = true; save(); addStars(2); }
function vD(c,w) { return state.progress['v_'+c+'_'+w] || false; }
function vM(c,w) { state.progress['v_'+c+'_'+w] = true; save(); addStars(1); }
function stD(id) { return state.progress['st_'+id] || false; }
function stM(id) { state.progress['st_'+id] = true; save(); addStars(3); }
function spellGet() { return state.progress['spell_best'] || 0; }
function spellSave(s) { if (s > spellGet()) { state.progress['spell_best'] = s; save(); } }
function matchGet() { return state.progress['match_best'] || 0; }
function matchSave(s) { if (s > matchGet()) { state.progress['match_best'] = s; save(); } }

// ====================================================================
// NAV
// ====================================================================
var navMap = {home:['home','progress'],letters:['letters','letterWrite'],vocab:['vocab','cat','wd'],spelling:['spelling','match'],stories:['stories','storyRead'],wordWrite:['wordWrite','wwCanvas']};

function navTo(s) { if (state.screen !== s) state.history.push(state.screen); state.screen = s; render(); updateNav(); updateBack(); window.scrollTo(0,0); }
function goBack() { if (state.history.length) { state.screen = state.history.pop(); render(); updateNav(); updateBack(); } }

function updateNav() {
  var els = document.querySelectorAll('.nv');
  for (var i = 0; i < els.length; i++) {
    var n = els[i].getAttribute('data-nav');
    var sc = navMap[n] || [];
    if (sc.indexOf(state.screen) >= 0) els[i].classList.add('active'); else els[i].classList.remove('active');
  }
}

var canvasRefs = {};
function initCanvas(wrapId, guideText) {
  var wrap = document.getElementById(wrapId);
  if (!wrap) return;
  var cvs = wrap.querySelector('canvas');
  if (!cvs) return;
  var w = wrap.clientWidth, h = wrap.clientHeight, dpr = window.devicePixelRatio || 1;
  cvs.width = w*dpr; cvs.height = h*dpr;
  var c = cvs.getContext('2d'); c.scale(dpr, dpr);
  cvs.style.width = w+'px'; cvs.style.height = h+'px';
  var drawing = false, lastP = null;

  function drawGuide() {
    c.clearRect(0,0,w,h);
    c.strokeStyle='rgba(74,111,165,0.07)'; c.lineWidth=1; c.setLineDash([]);
    c.beginPath(); c.moveTo(0,h*0.33); c.lineTo(w,h*0.33); c.stroke();
    c.setLineDash([4,4]); c.beginPath(); c.moveTo(0,h*0.5); c.lineTo(w,h*0.5); c.stroke();
    c.setLineDash([]); c.beginPath(); c.moveTo(0,h*0.67); c.lineTo(w,h*0.67); c.stroke();
    var sz = Math.min(w,h)*0.55;
    c.font = 'bold '+sz+'px Nunito'; c.textAlign='center'; c.textBaseline='middle';
    c.fillStyle='rgba(74,111,165,0.08)'; c.fillText(guideText,w/2,h/2);
  }
  function showFull() {
    drawGuide();
    var sz = Math.min(w,h)*0.55;
    c.font='bold '+sz+'px Nunito'; c.textAlign='center'; c.textBaseline='middle';
    c.fillStyle='rgba(74,111,165,0.22)'; c.fillText(guideText,w/2,h/2);
  }
  function gp(e){var r=cvs.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
  function sd(e){e.preventDefault();drawing=true;lastP=gp(e);}
  function dd(e){e.preventDefault();if(!drawing)return;var p=gp(e);c.beginPath();c.moveTo(lastP.x,lastP.y);c.lineTo(p.x,p.y);c.strokeStyle='#E8856C';c.lineWidth=4;c.lineCap='round';c.lineJoin='round';c.stroke();lastP=p;}
  function ed(e){if(e)e.preventDefault();drawing=false;}
  cvs.addEventListener('mousedown',sd);cvs.addEventListener('mousemove',dd);cvs.addEventListener('mouseup',ed);cvs.addEventListener('mouseleave',ed);
  cvs.addEventListener('touchstart',sd,{passive:false});cvs.addEventListener('touchmove',dd,{passive:false});cvs.addEventListener('touchend',ed,{passive:false});
  drawGuide();
  canvasRefs[wrapId] = {clear:drawGuide,show:showFull};
}

function render() {
  canvasRefs = {};
  var mc = document.getElementById('mc');
  var h = '';
  switch(state.screen) {
    case 'home': h = RH(); break;
    case 'letters': h = RL(); break;
    case 'letterWrite': h = RLW(); break;
    case 'wordWrite': h = RWW(); break;
    case 'wwCanvas': h = RWWC(); break;
    case 'vocab': h = RV(); break;
    case 'cat': h = RC(); break;
    case 'wd': h = RWD(); break;
    case 'spelling': h = RSp(); break;
    case 'match': h = RMatch(); break;
    case 'stories': h = RSt(); break;
    case 'storyRead': h = RStR(); break;
    case 'progress': h = RProg(); break;
    default: h = RH();
  }
  mc.innerHTML = h;
  updateStars();
  if (state.screen === 'letterWrite' && state.selLetter) {
    setTimeout(function(){initCanvas('upperWrap',state.selLetter.u);initCanvas('lowerWrap',state.selLetter.l);},100);
  }
  if (state.screen === 'wwCanvas' && state.selWord) {
    setTimeout(function(){initCanvas('wordWrap',state.selWord);},100);
  }
}

function startSpell(mode){var words=SPELL_WORDS.slice().sort(function(){return Math.random()-0.5;});var qs=[],cnt=Math.min(10,words.length);for(var i=0;i<cnt;i++){var w=words[i];if(mode==='missing'){var letters=w.w.split(''),bl=[];for(var j=0;j<letters.length;j++)if(/[a-z]/.test(letters[j]))bl.push(j);if(!bl.length)continue;var bI=bl[Math.floor(Math.random()*bl.length)],correct=letters[bI],opts=[correct];while(opts.length<4){var r='abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random()*26)];if(opts.indexOf(r)<0)opts.push(r);}opts.sort(function(){return Math.random()-0.5;});qs.push({t:'m',w:w.w,bi:bI,c:correct,o:opts,e:w.e,f:w.f});}else if(mode==='hear'){var opts=[w.w];SPELL_WORDS.filter(function(x){return x.w!==w.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3).forEach(function(o){opts.push(o.w);});opts.sort(function(){return Math.random()-0.5;});qs.push({t:'h',w:w.w,o:opts,e:w.e,f:w.f});}else if(mode==='first'){var correct=w.w[0],opts=[correct];while(opts.length<4){var r='abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random()*26)];if(opts.indexOf(r)<0)opts.push(r);}opts.sort(function(){return Math.random()-0.5;});qs.push({t:'f',w:w.w,c:correct,o:opts,e:w.e,f:w.f});}else if(mode==='emoji'){var opts=[w.w];SPELL_WORDS.filter(function(x){return x.w!==w.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3).forEach(function(o){opts.push(o.w);});opts.sort(function(){return Math.random()-0.5;});qs.push({t:'e',w:w.w,o:opts,e:w.e,f:w.f});}}state.spellState={qs:qs,qi:0,sc:0,ans:[]};state.matchState=null;render();}

function renderMatchResult(){var ms=state.matchState;if(!ms)return'';var pct=Math.round(ms.sc/ms.qs.length*100);matchSave(ms.sc);var emoji=pct>=90?'🌟':pct>=70?'🎉':pct>=50?'👍':'💪';var text=pct>=90?'عالی!':pct>=70?'خیلی خوب!':pct>=50?'خوبه!':'تمرین کن!';state.matchState=null;return'<div class="spc"><div style="font-size:2.8rem;margin-bottom:5px;animation:cl .8s ease">'+emoji+'</div><div style="font-size:1rem;font-weight:800;margin-bottom:3px">'+text+'</div><div style="font-size:.82rem;color:var(--tm)">'+ms.sc+' از '+ms.qs.length+' ('+pct+'%)</div><div class="nb" style="margin-top:10px"><button class="btn bp bl" style="flex:1" onclick="navTo(\'spelling\')">🔄</button><button class="btn bs bl" style="flex:1" onclick="navTo(\'home\')">🏠</button></div></div>';}

// STORIES
function RSt(){var h='<div class="st">📖 داستان‌ها ('+STORIES.length+')</div><p style="color:var(--tm);margin-bottom:10px;font-size:.75rem">هر خط جدا — سرعت قابل تنظیم</p>';for(var i=0;i<STORIES.length;i++){var s=STORIES[i];h+='<div class="strc" onclick="pickStory('+s.id+')"><div class="strt">'+s.e+' '+s.t+' <span style="font-size:.7rem;color:var(--tl)">'+s.f+'</span></div><div class="strp">'+s.lines[0]+' '+s.lines[1]+'...</div>'+(stD(s.id)?'<span style="color:var(--ok);font-size:.65rem;font-weight:700">✓</span>':'')+'</div>';}return h;}
function pickStory(id){for(var i=0;i<STORIES.length;i++)if(STORIES[i].id===id){state.selStory=STORIES[i];break;}state.storyAns={};navTo('storyRead');}
function RStR(){var s=state.selStory;if(!s)return'';var h='<div class="strf"><h3>'+s.e+' '+s.t+' — '+s.f+'</h3><div class="spctrl"><label>🔊</label><input type="range" min="0.4" max="1.2" step="0.1" value="'+speechRate+'" oninput="speechRate=parseFloat(this.value);document.getElementById(\'spd\').textContent=this.value"><span id="spd">'+speechRate+'</span></div>';for(var i=0;i<s.lines.length;i++){var safeLine=s.lines[i].replace(/'/g,"\\'");h+='<div class="strline" onclick="speak(\''+safeLine+'\')"><span class="slp">🔊</span><span>'+s.lines[i]+'</span></div>';}h+='<button class="btn ba" style="width:100%;margin:10px 0" onclick="readStory()">🔊 کل داستان</button>';for(var qi=0;qi<s.qs.length;qi++){var q=s.qs[qi],answered=state.storyAns[qi]!==undefined;h+='<div class="strq"><h4>❓ '+q.q+'</h4>';for(var oi=0;oi<q.o.length;oi++){var cls='qo';if(answered){if(oi===q.a)cls+=' corr';else if(oi===state.storyAns[qi]&&oi!==q.a)cls+=' wro';cls+=' dis';}h+='<button class="'+cls+'" onclick="ansStory('+qi+','+oi+','+q.a+')">'+q.o[oi]+'</button>';}h+='</div>';}h+='<div class="nb" style="margin-top:10px"><button class="btn bs" onclick="navTo(\'stories\')">←</button><button class="btn bok" onclick="stM('+s.id+');navTo(\'stories\')">✓ تمام شد</button></div></div>';return h;}
function ansStory(qi,sel,correct){state.storyAns[qi]=sel;if(sel===correct)speak('Good');else speak('Try again');render();}
function readStory(){var s=state.selStory;if(!s)return;var idx=0;function nx(){if(idx<s.lines.length){speak(s.lines[idx]);idx++;setTimeout(nx,Math.max(2000,s.lines[idx-1].split(' ').length*600));}}nx();}

// INIT
document.getElementById('mo').addEventListener('click',function(e){if(e.target.id==='mo')hideMod();});
document.getElementById('ro').addEventListener('click',function(e){if(e.target.id==='ro')hideReward();});
// Warm up audio
document.addEventListener('touchstart',function(){try{var u=new SpeechSynthesisUtterance('');u.volume=0;u.rate=10;speechSynthesis.speak(u);}catch(e){}},{once:true});
document.addEventListener('click',function(){try{var u=new SpeechSynthesisUtterance('');u.volume=0;u.rate=10;speechSynthesis.speak(u);}catch(e){}},{once:true});
render();updateNav();updateBack();
</script>
