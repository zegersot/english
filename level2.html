<script>
// ====================================================================
// AUDIO
// ====================================================================
var curAudio = null;
var speechRate = 0.8;

function speak(text, rate) {
  if (!state.soundOn || !text) return;
  if (curAudio) { try { curAudio.pause(); } catch(e) {} curAudio = null; }
  speechSynthesis.cancel();
  var r = rate || speechRate;
  try {
    var a = new Audio();
    a.src = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=' + encodeURIComponent(text);
    curAudio = a;
    a.play().catch(function() { fbSpeak(text, r); });
    a.onended = function() { curAudio = null; };
  } catch(e) { fbSpeak(text, r); }
}

function fbSpeak(text, rate) {
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = rate || 0.8;
  u.pitch = 1;
  speechSynthesis.speak(u);
}

// STATE
// ====================================================================
var state = {
  screen:'home', history:[], selLetter:null, selCat:null, selWord:null,
  selStory:null, storyAns:{}, spellState:null, soundOn:true,
  progress: JSON.parse(localStorage.getItem('lv2p') || '{}')
};

function save() { localStorage.setItem('lv2p', JSON.stringify(state.progress)); }
function lD(id) { return state.progress['l_'+id] || false; }
function lM(id) { state.progress['l_'+id] = true; save(); }
function vD(c,w) { return state.progress['v_'+c+'_'+w] || false; }
function vM(c,w) { state.progress['v_'+c+'_'+w] = true; save(); }
function stD(id) { return state.progress['st_'+id] || false; }
function stM(id) { state.progress['st_'+id] = true; save(); }

// ====================================================================
// NAV
// ====================================================================
var navMap = {home:['home'],letters:['letters','letterWrite'],vocab:['vocab','cat','wd'],spelling:['spelling'],stories:['stories','storyRead'],wordWrite:['wordWrite','wwCanvas']};

function navTo(s) {
  if (state.screen !== s) state.history.push(state.screen);
  state.screen = s;
  render();
  updateNav();
  updateBack();
  window.scrollTo(0,0);
}

function goBack() {
  if (state.history.length) {
    state.screen = state.history.pop();
    render();
    updateNav();
    updateBack();
  }
}

function updateNav() {
  var els = document.querySelectorAll('.nv');
  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    var n = el.getAttribute('data-nav');
    var screens = navMap[n] || [];
    var isActive = screens.indexOf(state.screen) >= 0;
    if (isActive) el.classList.add('active');
    else el.classList.remove('active');
  }
}

function updateBack() {
  var btn = document.getElementById('backBtn');
  btn.style.visibility = state.history.length > 0 ? 'visible' : 'hidden';
}

function toggleSound() {
  state.soundOn = !state.soundOn;
  document.getElementById('sndBtn').textContent = state.soundOn ? '🔊' : '🔇';
}

function showMod(h) { document.getElementById('md2').innerHTML = h; document.getElementById('mo').classList.add('show'); }
function hideMod() { document.getElementById('mo').classList.remove('show'); }

// ====================================================================
// CANVAS HELPER
// ====================================================================
var canvasRefs = {};

function initCanvas(wrapId, guideText) {
  var wrap = document.getElementById(wrapId);
  if (!wrap) return;
  var cvs = wrap.querySelector('canvas');
  if (!cvs) return;
  var w = wrap.clientWidth;
  var h = wrap.clientHeight;
  var dpr = window.devicePixelRatio || 1;
  cvs.width = w * dpr;
  cvs.height = h * dpr;
  var c = cvs.getContext('2d');
  c.scale(dpr, dpr);
  cvs.style.width = w + 'px';
  cvs.style.height = h + 'px';

  var drawing = false;
  var lastP = null;

  function drawGuide() {
    c.clearRect(0, 0, w, h);
    c.strokeStyle = 'rgba(74,111,165,0.08)';
    c.lineWidth = 1;
    c.setLineDash([]);
    c.beginPath(); c.moveTo(0, h*0.33); c.lineTo(w, h*0.33); c.stroke();
    c.setLineDash([4,4]);
    c.beginPath(); c.moveTo(0, h*0.5); c.lineTo(w, h*0.5); c.stroke();
    c.setLineDash([]);
    c.beginPath(); c.moveTo(0, h*0.67); c.lineTo(w, h*0.67); c.stroke();
    var sz = Math.min(w, h) * 0.6;
    c.font = 'bold ' + sz + 'px Nunito';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillStyle = 'rgba(74,111,165,0.1)';
    c.fillText(guideText, w/2, h/2);
  }

  function showFull() {
    drawGuide();
    var sz = Math.min(w, h) * 0.6;
    c.font = 'bold ' + sz + 'px Nunito';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillStyle = 'rgba(74,111,165,0.22)';
    c.fillText(guideText, w/2, h/2);
  }

  function clearIt() { drawGuide(); }

  function getPos(e) {
    var r = cvs.getBoundingClientRect();
    var t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }

  function sd(e) { e.preventDefault(); drawing = true; lastP = getPos(e); }
  function dd(e) {
    e.preventDefault();
    if (!drawing) return;
    var p = getPos(e);
    c.beginPath();
    c.moveTo(lastP.x, lastP.y);
    c.lineTo(p.x, p.y);
    c.strokeStyle = '#E8856C';
    c.lineWidth = 5;
    c.lineCap = 'round';
    c.lineJoin = 'round';
    c.stroke();
    lastP = p;
  }
  function ed(e) { if (e) e.preventDefault(); drawing = false; }

  cvs.addEventListener('mousedown', sd);
  cvs.addEventListener('mousemove', dd);
  cvs.addEventListener('mouseup', ed);
  cvs.addEventListener('mouseleave', ed);
  cvs.addEventListener('touchstart', sd, {passive:false});
  cvs.addEventListener('touchmove', dd, {passive:false});
  cvs.addEventListener('touchend', ed, {passive:false});

  drawGuide();

  canvasRefs[wrapId] = { clear: clearIt, show: showFull };
}

function render() {
  canvasRefs = {};
  var mc = document.getElementById('mc');
  var html = '';

  switch(state.screen) {
    case 'home': html = RH(); break;
    case 'letters': html = RL(); break;
    case 'letterWrite': html = RLW(); break;
    case 'wordWrite': html = RWW(); break;
    case 'wwCanvas': html = RWWC(); break;
    case 'vocab': html = RV(); break;
    case 'cat': html = RC(); break;
    case 'wd': html = RWD(); break;
    case 'spelling': html = RSp(); break;
    case 'stories': html = RSt(); break;
    case 'storyRead': html = RStR(); break;
    default: html = RH();
  }

  mc.innerHTML = html;

  if (state.screen === 'letterWrite' && state.selLetter) {
    setTimeout(function() {
      initCanvas('upperWrap', state.selLetter.u);
      initCanvas('lowerWrap', state.selLetter.l);
    }, 100);
  }
  if (state.screen === 'wwCanvas' && state.selWord) {
    setTimeout(function() {
      initCanvas('wordWrap', state.selWord);
    }, 100);
  }
}

function RL() {
  var dC = LETTERS.filter(function(l){return lD(l.id);}).length;
  var h = '<div class="st">✏️ نوشتن حروف (بزرگ و کوچک)</div>';
  h += '<p style="color:var(--tm);margin-bottom:8px;font-size:.8rem">هر حرف رو انتخاب کن — هم بزرگ هم کوچک رو تمرین میکنی</p>';
  h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><div class="pbar" style="flex:1"><div class="pbf" style="width:' + Math.round(dC/LETTERS.length*100) + '%;background:var(--p)"></div></div><span style="font-weight:800;color:var(--p)">' + dC + '/' + LETTERS.length + '</span></div>';
  h += '<div class="lg">';
  for (var i = 0; i < LETTERS.length; i++) {
    var l = LETTERS[i];
    var doneCls = lD(l.id) ? ' done' : '';
    h += '<div class="lc' + doneCls + '" onclick="pickLetter(\'' + l.id + '\')"><div class="lm">' + l.u + ' ' + l.l + '</div><div class="lx">' + l.u + l.l + '</div></div>';
  }
  h += '</div>';
  return h;
}

function pickLetter(id) {
  for (var i = 0; i < LETTERS.length; i++) {
    if (LETTERS[i].id === id) { state.selLetter = LETTERS[i]; break; }
  }
  navTo('letterWrite');
}

function RLW() {
  var l = state.selLetter;
  if (!l) return '<p>حرفی انتخاب نشده</p>';
  var idx = LETTERS.indexOf(l);
  var prev = idx > 0 ? LETTERS[idx-1] : null;
  var next = idx < LETTERS.length-1 ? LETTERS[idx+1] : null;
  var done = lD(l.id);

  var allW = [];
  CATS.forEach(function(c){ c.words.forEach(function(w){ allW.push(w); }); });
  var exW = [];
  for (var i = 0; i < allW.length && exW.length < 5; i++) {
    if (allW[i].w.toLowerCase().charAt(0) === l.l) exW.push(allW[i]);
  }

  var h = '<div class="wa">';
  h += '<div class="wex"><span class="wu">' + l.u + '</span><span class="wl">' + l.l + '</span></div>';
  h += '<div class="wrlbl"><span>بزرگ: ' + l.u + '</span><span>کوچک: ' + l.l + '</span></div>';
  h += '<button class="wpb" onclick="speak(\'' + l.l + '\')">🔊</button>';
  h += '<p style="font-size:.82rem;font-weight:700;color:var(--p);margin-bottom:6px">✏️ بزرگ بنویس: ' + l.u + '</p>';
  h += '<div class="cw cwu" id="upperWrap"><canvas></canvas></div>';
  h += '<div class="wc"><button class="wcb" onclick="if(canvasRefs.upperWrap)canvasRefs.upperWrap.clear()">🧹 پاک</button><button class="wcb" onclick="if(canvasRefs.upperWrap)canvasRefs.upperWrap.show()">👁️ نشون بده</button></div>';
  h += '<p style="font-size:.82rem;font-weight:700;color:var(--ac);margin-bottom:6px;margin-top:10px">✏️ کوچک بنویس: ' + l.l + '</p>';
  h += '<div class="cw cwl" id="lowerWrap"><canvas></canvas></div>';
  h += '<div class="wc"><button class="wcb" onclick="if(canvasRefs.lowerWrap)canvasRefs.lowerWrap.clear()">🧹 پاک</button><button class="wcb" onclick="if(canvasRefs.lowerWrap)canvasRefs.lowerWrap.show()">👁️ نشون بده</button></div>';
  h += '<div class="ws"><h4>📝 مراحل نوشتن:</h4>';
  for (var s = 0; s < l.steps.length; s++) {
    h += '<div class="si2"><div class="sn2">' + (s+1) + '</div><span>' + l.steps[s] + '</span></div>';
  }
  h += '</div>';
  h += '<div class="wt2">💡 ' + l.tip + '</div>';
  if (exW.length) {
    h += '<div style="background:var(--sf);border-radius:var(--r);padding:12px;box-shadow:var(--sh);margin-bottom:12px;direction:rtl;text-align:right"><h4 style="font-size:.8rem;color:var(--tl);margin-bottom:6px">📖 کلمات با «' + l.l + '»:</h4><div style="display:flex;flex-wrap:wrap;gap:6px;direction:ltr">';
    for (var e = 0; e < exW.length; e++) {
      h += '<span style="background:var(--pl);padding:5px 10px;border-radius:8px;font-weight:700;font-size:.83rem;cursor:pointer" onclick="speak(\'' + exW[e].w + '\')">' + exW[e].e + ' ' + exW[e].w + '</span>';
    }
    h += '</div></div>';
  }
  h += '<div class="nb">';
  if (prev) h += '<button class="btn bs" onclick="pickLetter(\'' + prev.id + '\')">← ' + prev.u + '</button>';
  if (!done) h += '<button class="btn bok" onclick="lM(\'' + l.id + '\');' + (next ? 'pickLetter(\'' + next.id + '\')' : 'navTo(\'letters\')') + '">✓ نوشتم!</button>';
  else h += '<button class="btn bg" style="flex:1;justify-content:center">✓ یاد گرفته</button>';
  if (next) h += '<button class="btn bs" onclick="pickLetter(\'' + next.id + '\')">' + next.u + ' →</button>';
  h += '</div></div>';
  return h;
}

// WORD WRITE
// ====================================================================
function RWW() {
  var unique = [];
  var seen = {};
  for (var i = 0; i < WRITE_WORDS.length; i++) {
    if (!seen[WRITE_WORDS[i]]) { unique.push(WRITE_WORDS[i]); seen[WRITE_WORDS[i]] = true; }
  }
  var allW = [];
  CATS.forEach(function(c){ c.words.forEach(function(w){ allW.push(w); }); });

  var h = '<div class="st">✍️ نوشتن کلمات (' + unique.length + ' کلمه)</div>';
  h += '<p style="color:var(--tm);margin-bottom:12px;font-size:.8rem">کلمه‌ای رو انتخاب کن و روی خط بنویس</p>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:7px">';
  for (var i = 0; i < unique.length; i++) {
    var w = unique[i];
    var item = null;
    for (var j = 0; j < allW.length; j++) { if (allW[j].w === w) { item = allW[j]; break; } }
    var emoji = item ? item.e : '📝';
    h += '<div style="background:var(--sf);padding:9px 13px;border-radius:var(--rs);box-shadow:var(--sh);cursor:pointer;display:flex;align-items:center;gap:5px" onclick="pickWW(\'' + w + '\')"><span style="font-size:1.1rem">' + emoji + '</span><span style="font-weight:800;font-size:.92rem">' + w + '</span></div>';
  }
  h += '</div>';
  return h;
}

function pickWW(word) {
  state.selWord = word;
  navTo('wwCanvas');
}

function RWWC() {
  var word = state.selWord;
  if (!word) return '';
  var allW = [];
  CATS.forEach(function(c){ c.words.forEach(function(w){ allW.push(w); }); });
  var item = null;
  for (var j = 0; j < allW.length; j++) { if (allW[j].w === word) { item = allW[j]; break; } }
  var emoji = item ? item.e : '📝';

  var h = '<div class="wa">';
  h += '<div style="font-size:3rem;margin-bottom:4px">' + emoji + '</div>';
  h += '<div style="font-size:2rem;font-weight:900;color:var(--p);margin-bottom:4px">' + word + '</div>';
  h += '<button class="wpb" onclick="speak(\'' + word + '\')">🔊</button>';
  h += '<div class="cw cww" id="wordWrap"><canvas></canvas></div>';
  h += '<div class="wc"><button class="wcb" onclick="if(canvasRefs.wordWrap)canvasRefs.wordWrap.clear()">🧹 پاک</button><button class="wcb" onclick="if(canvasRefs.wordWrap)canvasRefs.wordWrap.show()">👁️ نشون بده</button></div>';
  h += '<div class="nb"><button class="btn bs" onclick="navTo(\'wordWrite\')">← برگشت</button><button class="btn bok" onclick="navTo(\'wordWrite\')">✓ نوشتم!</button></div>';
  h += '</div>';
  return h;
}

// ====================================================================
// VOCAB
// ====================================================================
function RV() {
  var tV = 0;
  CATS.forEach(function(c){ tV += c.words.length; });
  var h = '<div class="st">📚 لغات جدید (' + CATS.length + ' دسته — ' + tV + ' کلمه)</div><div class="cg">';
  for (var i = 0; i < CATS.length; i++) {
    var c = CATS[i];
    var done = 0;
    c.words.forEach(function(w){ if(vD(c.id,w.w)) done++; });
    var pct = Math.round(done/c.words.length*100);
    h += '<div class="cc" onclick="pickCat(\'' + c.id + '\')"><div class="ce">' + c.icon + '</div><div class="cn">' + c.t + '</div><div class="cd">' + c.f + ' — ' + c.words.length + '</div><div class="cb"><div class="cbf" style="width:' + pct + '%;background:' + c.col + '"></div></div></div>';
  }
  h += '</div>';
  return h;
}

function pickCat(id) { state.selCat = id; navTo('cat'); }

function RC() {
  var cat = null;
  for (var i = 0; i < CATS.length; i++) { if (CATS[i].id === state.selCat) { cat = CATS[i]; break; } }
  if (!cat) return '<p>دسته‌ای انتخاب نشده</p>';

  var h = '<div class="st">' + cat.icon + ' ' + cat.t + ' — ' + cat.f + ' (' + cat.words.length + ')</div>';
  h += '<div style="margin-bottom:12px"><button class="btn bp sm" onclick="spCat(\'' + cat.id + '\')">🔊 همه رو بخون</button></div>';
  h += '<div class="vg">';
  for (var i = 0; i < cat.words.length; i++) {
    var w = cat.words[i];
    var doneCls = vD(cat.id, w.w) ? ' done' : '';
    h += '<div class="vc' + doneCls + '" onclick="pickVW(\'' + cat.id + '\',' + i + ')"><div class="ve">' + w.e + '</div><div class="vw">' + w.w + '</div><div class="vf">' + w.f + '</div></div>';
  }
  h += '</div>';
  return h;
}

function spCat(id) {
  var cat = null;
  for (var i = 0; i < CATS.length; i++) { if (CATS[i].id === id) { cat = CATS[i]; break; } }
  if (!cat) return;
  var idx = 0;
  function nx() {
    if (idx < cat.words.length) { speak(cat.words[idx].w); idx++; setTimeout(nx, 1100); }
  }
  nx();
}

function pickVW(catId, idx) { state.selCat = catId; state.selWord = idx; navTo('wd'); }

function RWD() {
  var cat = null;
  for (var i = 0; i < CATS.length; i++) { if (CATS[i].id === state.selCat) { cat = CATS[i]; break; } }
  if (!cat) return '';
  var w = cat.words[state.selWord];
  if (!w) return '';
  var idx = state.selWord;
  var prev = idx > 0 ? cat.words[idx-1] : null;
  var next = idx < cat.words.length-1 ? cat.words[idx+1] : null;
  var done = vD(cat.id, w.w);

  var h = '<div class="wd2">';
  h += '<div style="font-size:4.5rem;margin-bottom:6px">' + w.e + '</div>';
  h += '<div style="font-size:2.2rem;font-weight:900;color:var(--p);margin-bottom:3px">' + w.w + '</div>';
  h += '<div style="font-size:.92rem;color:var(--tl);direction:rtl;margin-bottom:14px">' + w.f + '</div>';
  h += '<button class="wpb" onclick="speak(\'' + w.w + '\')">🔊</button>';
  h += '<button class="btn bo sm" style="margin:0 auto 12px;display:flex" onclick="speak(\'' + w.w + '\',0.45)">🔉 آهسته</button>';
  h += '<div class="wps" onclick="speak(\'This is a ' + w.w + '.\')">📝 This is a ' + w.w + '.</div>';
  h += '<div style="background:var(--sf);border-radius:var(--r);padding:12px;box-shadow:var(--sh);margin-bottom:14px;cursor:pointer" onclick="speak(\'' + w.w + '\')">';
  h += '<div style="font-size:1.8rem;font-weight:900;color:var(--p);letter-spacing:5px">' + w.w.split('').join(' ') + '</div>';
  h += '<div style="font-size:.72rem;color:var(--tl);margin-top:3px">هر حرف رو ببین</div></div>';
  h += '<div class="nb">';
  if (prev) h += '<button class="btn bs" onclick="pickVW(\'' + cat.id + '\',' + (idx-1) + ')">← ' + prev.e + '</button>';
  if (!done) h += '<button class="btn bok" onclick="vM(\'' + cat.id + '\',\'' + w.w + '\');pickVW(\'' + cat.id + '\',' + (next ? idx+1 : idx) + ')">✓ یاد گرفتم!</button>';
  else h += '<button class="btn bg" style="flex:1;justify-content:center">✓ یاد گرفته</button>';
  if (next) h += '<button class="btn bs" onclick="pickVW(\'' + cat.id + '\',' + (idx+1) + ')">' + next.e + ' →</button>';
  h += '</div></div>';
  return h;
}

// ====================================================================
// SPELLING
// ====================================================================
function RSp() {
  if (!state.spellState) {
    return '<div class="st">🧩 تمرین املاء</div><p style="color:var(--tm);margin-bottom:14px;font-size:.8rem">یک تمرین رو انتخاب کن</p><div class="pg">'
      + '<div class="pc" onclick="startSpell(\'missing\')"><div class="pi2" style="background:#EEE8F5;color:#7B6BAF">🔤</div><div class="pinf"><h3>حرف جا‌افتاده</h3><p>حرف خالی رو پر کن</p></div></div>'
      + '<div class="pc" onclick="startSpell(\'hear\')"><div class="pi2" style="background:#FDF0EC;color:#E8856C">🔊</div><div class="pinf"><h3>بشنو و انتخاب کن</h3><p>کلمه رو بشنو و پیدا کن</p></div></div>'
      + '<div class="pc" onclick="startSpell(\'first\')"><div class="pi2" style="background:#E8F4F0;color:#3D7B6F">1️⃣</div><div class="pinf"><h3>حرف اول</h3><p>حرف اول کلمه چیه؟</p></div></div>'
      + '<div class="pc" onclick="startSpell(\'emoji\')"><div class="pi2" style="background:#FDF6E3;color:#D4A650">🖼️</div><div class="pinf"><h3>شکلک و کلمه</h3><p>از روی شکلک بنویس</p></div></div>'
      + '</div>';
  }
  return renderSpellQ();
}

function startSpell(mode) {
  var words = SPELL_WORDS.slice().sort(function(){return Math.random()-0.5;});
  var qs = [];
  var cnt = Math.min(10, words.length);
  for (var i = 0; i < cnt; i++) {
    var w = words[i];
    if (mode === 'missing') {
      var letters = w.w.split('');
      var bl = [];
      for (var j = 0; j < letters.length; j++) { if (/[a-z]/.test(letters[j])) bl.push(j); }
      if (!bl.length) continue;
      var bI = bl[Math.floor(Math.random()*bl.length)];
      var correct = letters[bI];
      var opts = [correct];
      while (opts.length < 4) {
        var r = 'abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random()*26)];
        if (opts.indexOf(r) < 0) opts.push(r);
      }
      opts.sort(function(){return Math.random()-0.5;});
      qs.push({type:'missing',word:w.w,blankIdx:bI,correct:correct,opts:opts,emoji:w.e,farsi:w.f});
    } else if (mode === 'hear') {
      var opts = [w.w];
      var others = words.filter(function(x){return x.w!==w.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3);
      others.forEach(function(o){opts.push(o.w);});
      opts.sort(function(){return Math.random()-0.5;});
      qs.push({type:'hear',word:w.w,opts:opts,emoji:w.e,farsi:w.f});
    } else if (mode === 'first') {
      var correct = w.w[0];
      var opts = [correct];
      while (opts.length < 4) {
        var r = 'abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random()*26)];
        if (opts.indexOf(r) < 0) opts.push(r);
      }
      opts.sort(function(){return Math.random()-0.5;});
      qs.push({type:'first',word:w.w,correct:correct,opts:opts,emoji:w.e,farsi:w.f});
    } else if (mode === 'emoji') {
      var opts = [w.w];
      var others = words.filter(function(x){return x.w!==w.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3);
      others.forEach(function(o){opts.push(o.w);});
      opts.sort(function(){return Math.random()-0.5;});
      qs.push({type:'emoji',word:w.w,opts:opts,emoji:w.e,farsi:w.f});
    }
  }
  state.spellState = {mode:mode,questions:qs,qi:0,score:0,answers:[]};
  render();
}

function cancelSpell() { state.spellState = null; render(); }

function renderSpellQ() {
  var ss = state.spellState;
  if (!ss) return '';
  if (ss.qi >= ss.questions.length) return renderSpellResult();
  var q = ss.questions[ss.qi];

  var dots = '';
  for (var i = 0; i < ss.questions.length; i++) {
    var c = 'spd';
    if (i === ss.qi) c += ' cur';
    else if (i < ss.qi) c += ss.answers[i] ? ' ok2' : ' fl';
    dots += '<div class="' + c + '"></div>';
  }

  var main = '';
  if (q.type === 'missing') {
    var letters = q.word.split('');
    var wordHtml = '';
    for (var i = 0; i < letters.length; i++) {
      if (i === q.blankIdx) wordHtml += '<div class="spch blank">?</div>';
      else wordHtml += '<div class="spch">' + letters[i] + '</div>';
    }
    var optsHtml = '';
    for (var i = 0; i < q.opts.length; i++) {
      optsHtml += '<button class="spopt" data-a="' + q.opts[i] + '" data-c="' + q.correct + '" onclick="ansSp(this)">' + q.opts[i] + '</button>';
    }
    main = '<div class="spemoji">' + q.emoji + '</div><div style="font-size:.82rem;color:var(--tm);margin-bottom:8px">' + q.farsi + '</div>'
      + '<div class="spword">' + wordHtml + '</div><div class="spopts">' + optsHtml + '</div>';
  } else if (q.type === 'hear') {
    var optsHtml = '';
    for (var i = 0; i < q.opts.length; i++) {
      optsHtml += '<button class="spopt" data-a="' + q.opts[i] + '" data-c="' + q.word + '" onclick="ansSp(this)" style="font-size:.95rem;padding:12px 16px">' + q.opts[i] + '</button>';
    }
    main = '<button class="wpb" onclick="speak(\'' + q.word + '\')">🔊</button>'
      + '<div style="font-size:.78rem;color:var(--tl);margin-bottom:8px">برای شنیدن بزن</div>'
      + '<div class="spemoji">' + q.emoji + '</div><div style="font-size:.82rem;color:var(--tm);margin-bottom:8px">' + q.farsi + '</div>'
      + '<div class="spopts">' + optsHtml + '</div>';
  } else if (q.type === 'first') {
    var optsHtml = '';
    for (var i = 0; i < q.opts.length; i++) {
      optsHtml += '<button class="spopt" data-a="' + q.opts[i] + '" data-c="' + q.correct + '" onclick="ansSp(this)">' + q.opts[i] + '</button>';
    }
    main = '<div class="spemoji">' + q.emoji + '</div><div style="font-size:.82rem;color:var(--tm);margin-bottom:4px">' + q.farsi + '</div>'
      + '<div style="font-size:1.8rem;font-weight:900;color:var(--tl);margin-bottom:10px;letter-spacing:5px">? ' + q.word.slice(1) + '</div>'
      + '<div style="font-size:.8rem;color:var(--tm);margin-bottom:8px">حرف اول چیه؟</div>'
      + '<div class="spopts">' + optsHtml + '</div>';
  } else if (q.type === 'emoji') {
    var optsHtml = '';
    for (var i = 0; i < q.opts.length; i++) {
      optsHtml += '<button class="spopt" data-a="' + q.opts[i] + '" data-c="' + q.word + '" onclick="ansSp(this)" style="font-size:.95rem;padding:12px 16px">' + q.opts[i] + '</button>';
    }
    main = '<div class="spemoji" style="font-size:4.5rem">' + q.emoji + '</div>'
      + '<div style="font-size:.92rem;color:var(--tm);margin-bottom:14px">این چیه؟</div>'
      + '<div class="spopts">' + optsHtml + '</div>';
  }

  return '<div class="sptb"><button class="btn bs sm" onclick="cancelSpell()">← برگشت</button><span style="font-size:.78rem;color:var(--tl)">' + (ss.qi+1) + '/' + ss.questions.length + '</span></div>'
    + '<div class="spc"><div class="spprog">' + dots + '</div>' + main + '</div>';
}

function ansSp(btn) {
  var ss = state.spellState;
  if (!ss) return;
  var sel = btn.getAttribute('data-a');
  var correct = btn.getAttribute('data-c');
  var ok = sel === correct;
  ss.answers.push(ok);
  if (ok) ss.score++;

  var opts = document.querySelectorAll('.spopt');
  for (var i = 0; i < opts.length; i++) {
    opts[i].classList.add('dis');
    if (opts[i].getAttribute('data-a') === correct) opts[i].classList.add('ok');
    if (opts[i].getAttribute('data-a') === sel && !ok) opts[i].classList.add('bad');
  }
  if (ok) speak('Good!'); else speak(correct);
  setTimeout(function(){ ss.qi++; render(); }, 1200);
}

function renderSpellResult() {
  var ss = state.spellState;
  if (!ss) return '';
  var pct = Math.round(ss.score / ss.questions.length * 100);
  var emoji = pct >= 90 ? '🌟' : pct >= 70 ? '🎉' : pct >= 50 ? '👍' : '💪';
  var text = pct >= 90 ? 'عالی!' : pct >= 70 ? 'خیلی خوب!' : pct >= 50 ? 'خوبه!' : 'بیشتر تمرین کن!';
  state.spellState = null;
  return '<div class="spc"><div style="font-size:3.5rem;margin-bottom:8px;animation:cl .8s ease">' + emoji + '</div>'
    + '<div style="font-size:1.2rem;font-weight:800;margin-bottom:5px">' + text + '</div>'
    + '<div style="font-size:.92rem;color:var(--tm)">' + ss.score + ' از ' + ss.questions.length + ' (' + pct + '%)</div>'
    + '<div class="nb" style="margin-top:14px"><button class="btn bp bl" style="flex:1" onclick="navTo(\'spelling\')">🔄 بیشتر</button><button class="btn bs bl" style="flex:1" onclick="navTo(\'home\')">🏠 خانه</button></div></div>';
}

// ====================================================================
// STORIES
// ====================================================================
function RSt() {
  var h = '<div class="st">📖 داستان‌ها (' + STORIES.length + ')</div>';
  h += '<p style="color:var(--tm);margin-bottom:14px;font-size:.8rem">هر خط جدا خونده میشه — سرعت صدا قابل تنظیمه</p>';
  for (var i = 0; i < STORIES.length; i++) {
    var s = STORIES[i];
    var doneMark = stD(s.id) ? '<span style="color:var(--ok);font-size:.7rem;font-weight:700">✓</span>' : '';
    h += '<div class="strc" onclick="pickStory(' + s.id + ')"><div class="strt">' + s.e + ' ' + s.t + ' <span style="font-size:.75rem;color:var(--tl)">' + s.f + '</span></div><div class="strp">' + s.lines[0] + ' ' + s.lines[1] + '...</div>' + doneMark + '</div>';
  }
  return h;
}

function pickStory(id) {
  for (var i = 0; i < STORIES.length; i++) {
    if (STORIES[i].id === id) { state.selStory = STORIES[i]; break; }
  }
  state.storyAns = {};
  navTo('storyRead');
}

function RStR() {
  var s = state.selStory;
  if (!s) return '';

  var h = '<div class="strf"><h3>' + s.e + ' ' + s.t + ' — ' + s.f + '</h3>';
  h += '<div class="spctrl"><label>🔊 سرعت:</label><input type="range" min="0.4" max="1.2" step="0.1" value="' + speechRate + '" oninput="speechRate=parseFloat(this.value);document.getElementById(\'spdVal\').textContent=this.value"><span id="spdVal">' + speechRate + '</span></div>';

  for (var i = 0; i < s.lines.length; i++) {
    var line = s.lines[i];
    var safeLine = line.replace(/'/g, "\\'");
    h += '<div class="strline" onclick="speak(\'' + safeLine + '\')"><span class="slp">🔊</span><span>' + line + '</span></div>';
  }

  h += '<button class="btn ba" style="width:100%;margin:14px 0" onclick="readStory()">🔊 کل داستان رو بخون</button>';

  for (var qi = 0; qi < s.qs.length; qi++) {
    var q = s.qs[qi];
    var answered = state.storyAns[qi] !== undefined;
    h += '<div class="strq"><h4>❓ ' + q.q + '</h4>';
    for (var oi = 0; oi < q.o.length; oi++) {
      var cls = 'qo';
      if (answered) {
        if (oi === q.a) cls += ' corr';
        else if (oi === state.storyAns[qi] && oi !== q.a) cls += ' wro';
        cls += ' dis';
      }
      h += '<button class="' + cls + '" onclick="ansStory(' + qi + ',' + oi + ',' + q.a + ')">' + q.o[oi] + '</button>';
    }
    h += '</div>';
  }

  h += '<div class="nb" style="margin-top:14px"><button class="btn bs" onclick="navTo(\'stories\')">← برگشت</button><button class="btn bok" onclick="stM(' + s.id + ');navTo(\'stories\')">✓ تمام شد</button></div>';
  h += '</div>';
  return h;
}

function ansStory(qi, sel, correct) {
  state.storyAns[qi] = sel;
  if (sel === correct) speak('Good!');
  else speak('Try again');
  render();
}

function readStory() {
  var s = state.selStory;
  if (!s) return;
  var idx = 0;
  function nx() {
    if (idx < s.lines.length) {
      speak(s.lines[idx]);
      idx++;
      setTimeout(nx, Math.max(2000, s.lines[idx-1].split(' ').length * 600));
    }
  }
  nx();
}

// ====================================================================
// INIT
// ====================================================================
document.getElementById('mo').addEventListener('click', function(e) {
  if (e.target.id === 'mo') hideMod();
});
render();
</script>
