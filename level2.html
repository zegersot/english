<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Writing & Words — Level 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0E8;--sf:#FFF;--p:#4A6FA5;--pl:#E8EFF8;--pd:#365A8A;--ac:#E8856C;--al:#FDF0EC;--gd:#D4A650;--gl:#FDF6E3;--tx:#2D2926;--tm:#5A524C;--tl:#8A837D;--ok:#6BAF7E;--okl:#EDF7EF;--bd:#D96B6B;--r:16px;--rs:10px;--rl:24px;--sh:0 2px 12px rgba(45,41,38,.08);--shl:0 8px 32px rgba(45,41,38,.12);--tr:.3s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;flex-direction:column;max-width:900px;margin:0 auto}
.hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--sf);border-bottom:1px solid rgba(0,0,0,.05);position:sticky;top:0;z-index:100}
.hdr h1{font-size:.95rem;font-weight:800;background:linear-gradient(135deg,var(--p),var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hb{background:var(--pl);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--tr);font-size:1rem;color:var(--p)}
.hb:hover{background:var(--p);color:#fff}
.stars-badge{background:var(--gl);color:var(--gd);padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:800;display:flex;align-items:center;gap:4px}
.mc{flex:1;padding:12px 12px 100px}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes cl{0%{transform:scale(1)}25%{transform:scale(1.15) rotate(-3deg)}50%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1)}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 0 0 rgba(74,111,165,.3)}50%{box-shadow:0 0 20px 8px rgba(74,111,165,.15)}}
.st{font-size:1.05rem;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.btn{padding:11px 18px;border-radius:var(--rs);border:none;font-family:inherit;font-size:.83rem;font-weight:700;cursor:pointer;transition:var(--tr);display:inline-flex;align-items:center;gap:5px}
.btn:active{transform:scale(.96)}
.bp{background:var(--p);color:#fff;flex:1;justify-content:center}
.bs{background:var(--pl);color:var(--p);flex:1;justify-content:center}
.ba{background:var(--ac);color:#fff;flex:1;justify-content:center}
.bg{background:var(--gd);color:#fff;flex:1;justify-content:center}
.bok{background:var(--ok);color:#fff;flex:1;justify-content:center}
.bo{background:transparent;color:var(--p);border:2px solid var(--p);flex:1;justify-content:center}
.bl{padding:14px 28px;font-size:1rem;border-radius:var(--r)}
.sm{padding:7px 14px;font-size:.78rem;flex:none}
.nb{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.hh{text-align:center;padding:26px 14px;background:linear-gradient(145deg,var(--pl),var(--al));border-radius:var(--rl);margin-bottom:20px;animation:su .5s ease}
.hh .eb{font-size:2.8rem;margin-bottom:6px;display:block}
.hh h2{font-size:1.3rem;font-weight:900;margin-bottom:4px;color:var(--pd)}
.hh p{font-size:.82rem;color:var(--tm);line-height:1.6}
.pg{display:grid;gap:10px}
.pc{background:var(--sf);border-radius:var(--r);padding:14px;box-shadow:var(--sh);cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:10px;border:2px solid transparent}
.pc:hover{transform:translateY(-2px);box-shadow:var(--shl);border-color:var(--pl)}
.pc:active{transform:scale(.98)}
.pi2{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.pinf{flex:1;min-width:0}
.pinf h3{font-size:.88rem;font-weight:800;margin-bottom:2px}
.pinf p{font-size:.7rem;color:var(--tl)}
.pbar{width:100%;height:4px;background:#eee;border-radius:2px;margin-top:4px;overflow:hidden}
.pbf{height:100%;border-radius:2px;transition:width .5s ease}
.pbadge{font-size:.56rem;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.sc{background:var(--sf);border-radius:var(--r);padding:12px 6px;text-align:center;box-shadow:var(--sh)}
.sn{font-size:1.3rem;font-weight:900;color:var(--p)}
.sl{font-size:.58rem;color:var(--tl);margin-top:2px}
.lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:7px}
.lc{background:var(--sf);border-radius:var(--r);padding:8px 4px;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:var(--tr);border:2px solid transparent;position:relative}
.lc:active{transform:scale(.92)}
.lc .lm{font-size:.6rem;color:var(--tl);font-weight:600;letter-spacing:1px}
.lc .lx{font-size:1.4rem;font-weight:900;color:var(--p);line-height:1.1}
.lc.done{border-color:var(--ok);background:var(--okl)}
.lc.done::after{content:'✓';position:absolute;top:1px;right:3px;color:var(--ok);font-weight:800;font-size:.55rem}
.wa{text-align:center;animation:fi .4s ease}
.wex{display:flex;align-items:flex-end;justify-content:center;gap:20px;margin-bottom:6px}
.wex .wu{font-size:4rem;font-weight:900;color:var(--p);line-height:1}
.wex .wl{font-size:3rem;font-weight:900;color:var(--ac);line-height:1;opacity:.8}
.cw{position:relative;width:95%;max-width:400px;margin:0 auto 6px;border-radius:var(--r);overflow:hidden;border:3px solid var(--pl);background:#fff;touch-action:none}
.cwu{height:160px}.cwl{height:120px}.cww{height:140px}
.cw canvas{display:block;width:100%;height:100%}
.wc{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.wcb{padding:8px 14px;border-radius:20px;border:2px solid var(--pl);background:#fff;font-family:inherit;font-weight:700;font-size:.78rem;color:var(--p);cursor:pointer;transition:var(--tr)}
.wcb:active{transform:scale(.95);background:var(--pl)}
.ws{background:var(--sf);border-radius:var(--r);padding:12px;box-shadow:var(--sh);margin-bottom:10px;text-align:right;direction:rtl}
.ws h4{font-size:.78rem;color:var(--tl);margin-bottom:5px;font-weight:700}
.si2{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:.8rem;direction:ltr}
.sn2{width:20px;height:20px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex-shrink:0}
.wt2{background:var(--gl);border-radius:var(--rs);padding:8px;font-size:.78rem;color:var(--tm);direction:rtl;margin-bottom:10px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.cc{background:var(--sf);border-radius:var(--r);padding:14px 8px;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:var(--tr)}
.cc:active{transform:scale(.95)}
.cc .ce{font-size:1.8rem;margin-bottom:2px}
.cc .cn{font-size:.78rem;font-weight:800}
.cc .cd{font-size:.62rem;color:var(--tl)}
.cc .cb{width:100%;height:3px;background:#eee;border-radius:2px;margin-top:4px;overflow:hidden}
.cc .cbf{height:100%;border-radius:2px}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.vc{background:var(--sf);border-radius:var(--r);padding:12px 6px;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:var(--tr);border:2px solid transparent;position:relative}
.vc:active{transform:scale(.92)}.vc:hover{border-color:var(--pl)}
.vc .ve{font-size:2rem;margin-bottom:2px}
.vc .vw{font-size:.88rem;font-weight:800}
.vc .vf{font-size:.62rem;color:var(--tl);direction:rtl}
.vc.done{border-color:var(--ok);background:var(--okl)}
.vc.done::after{content:'✓';position:absolute;top:2px;right:3px;color:var(--ok);font-weight:800;font-size:.55rem}
.wd2{text-align:center;animation:fi .4s ease}
.wpb{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#d06a50);border:none;color:#fff;font-size:1.3rem;cursor:pointer;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.wpb:active{transform:scale(.88)}
.wps{background:var(--pl);border-radius:var(--rs);padding:8px 12px;font-size:.88rem;color:var(--pd);font-weight:600;margin-bottom:10px;cursor:pointer}
.wps:active{background:var(--p);color:#fff}
.sptb{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.spc{background:var(--sf);border-radius:var(--rl);padding:18px 12px;box-shadow:var(--shl);text-align:center;animation:su .5s ease;margin-bottom:12px}
.spemoji{font-size:2.8rem;margin-bottom:5px}
.spword{font-size:1.6rem;font-weight:900;letter-spacing:3px;margin-bottom:8px;display:flex;justify-content:center;gap:4px;flex-wrap:wrap}
.spch{width:36px;height:44px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;border:2px solid #ddd;background:#fff}
.spch.blank{border-color:var(--p);background:var(--pl)}
.spopts{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:8px}
.spopt{padding:10px 18px;border-radius:var(--rs);border:2px solid #eee;background:var(--sf);font-family:inherit;font-size:1rem;font-weight:800;cursor:pointer;transition:var(--tr);min-width:42px}
.spopt:hover{border-color:var(--p);background:var(--pl)}
.spopt.ok{background:var(--ok)!important;color:#fff!important;border-color:var(--ok)!important}
.spopt.bad{background:#FDECEC!important;border-color:var(--bd)!important}
.spopt.dis{pointer-events:none;opacity:.6}
.spprog{display:flex;gap:3px;justify-content:center;margin-bottom:12px}
.spd{width:7px;height:7px;border-radius:50%;background:#ddd}
.spd.cur{background:var(--p);transform:scale(1.3)}
.spd.ok2{background:var(--ok)}.spd.fl{background:var(--bd)}
/* MATCH GAME */
.match-emoji{font-size:5rem;margin-bottom:8px;animation:fi .4s ease}
.match-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.match-opt{padding:16px;border-radius:var(--r);border:3px solid #eee;background:var(--sf);font-family:inherit;font-size:1.1rem;font-weight:800;cursor:pointer;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px}
.match-opt .mo-emoji{font-size:2rem}
.match-opt:hover{border-color:var(--p);background:var(--pl)}
.match-opt:active{transform:scale(.95)}
.match-opt.correct{border-color:var(--ok);background:var(--okl);animation:cl .6s ease}
.match-opt.wrong{border-color:var(--bd);background:#FDECEC}
.match-opt.dis{pointer-events:none;opacity:.5}
/* STORIES */
.strc{background:var(--sf);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:10px;cursor:pointer;transition:var(--tr)}
.strc:active{transform:scale(.98)}
.strt{font-size:.92rem;font-weight:800;display:flex;align-items:center;gap:5px;margin-bottom:2px}
.strp{font-size:.78rem;color:var(--tm);line-height:1.5}
.strf{background:var(--sf);border-radius:var(--r);padding:18px;box-shadow:var(--sh);animation:fi .4s ease}
.strf h3{font-size:1.1rem;font-weight:900;text-align:center;margin-bottom:8px}
.spctrl{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;padding:8px;background:var(--pl);border-radius:var(--rs)}
.spctrl label{font-size:.75rem;font-weight:700;color:var(--p)}
.spctrl input[type=range]{width:100px;accent-color:var(--p)}
.spctrl span{font-size:.75rem;color:var(--tm);min-width:25px}
.strline{font-size:1rem;line-height:2;color:var(--tx);margin-bottom:2px;cursor:pointer;padding:3px 6px;border-radius:6px;transition:var(--tr);display:flex;align-items:center;gap:6px}
.strline:hover{background:var(--pl)}
.strline .slp{font-size:.9rem;opacity:.4;transition:var(--tr);flex-shrink:0}
.strline:hover .slp{opacity:1}
.strq{background:var(--pl);border-radius:var(--r);padding:12px;margin-top:12px;margin-bottom:6px;direction:rtl;text-align:right}
.strq h4{font-size:.82rem;color:var(--p);margin-bottom:6px}
.qo{padding:10px;border-radius:var(--rs);border:2px solid #ddd;background:#fff;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:var(--tr);text-align:right;direction:rtl;margin-bottom:5px;display:block;width:100%}
.qo:hover{border-color:var(--p)}
.qo.corr{border-color:var(--ok);background:var(--okl);color:var(--ok)}
.qo.wro{border-color:var(--bd);background:#FDECEC}
.qo.dis{pointer-events:none}
/* WELCOME */
.welcome{text-align:center;padding:40px 20px;animation:fi .6s ease}
.welcome .we{font-size:5rem;margin-bottom:16px;display:block}
.welcome h2{font-size:1.6rem;font-weight:900;color:var(--pd);margin-bottom:8px}
.welcome p{font-size:.9rem;color:var(--tm);margin-bottom:28px;line-height:1.6}
.welcome-btn{width:80%;max-width:300px;margin:0 auto;padding:18px;font-size:1.15rem;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;font-family:inherit;font-weight:800;cursor:pointer;animation:pulse-glow 2s ease infinite}
.welcome-btn:active{transform:scale(.96)}
/* REWARD */
.reward-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:300}
.reward-overlay.show{display:flex}
.reward-card{background:var(--sf);border-radius:var(--rl);padding:30px 24px;text-align:center;animation:cl .8s ease;max-width:300px;width:90%}
.reward-card .rstar{font-size:4rem;margin-bottom:8px}
.reward-card h3{font-size:1.3rem;font-weight:900;margin-bottom:6px}
.reward-card p{color:var(--tm);font-size:.9rem;margin-bottom:16px}
/* NAV */
.bn2{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid rgba(0,0,0,.06);padding:5px 0;padding-bottom:max(5px,env(safe-area-inset-bottom));z-index:100}
.bn2 .ni{display:flex;gap:1px;max-width:520px;width:100%;justify-content:space-around;margin:0 auto}
.nv{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 6px;border-radius:10px;background:none;border:none;cursor:pointer;font-family:inherit;transition:var(--tr);color:var(--tl);font-size:.54rem;font-weight:700;min-width:50px}
.nv .ni2{font-size:1rem}.nv.active{color:var(--p);background:var(--pl)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.mo.show{display:flex}
.md{background:var(--sf);border-radius:var(--rl);padding:24px 18px;max-width:340px;width:100%;text-align:center}
.md h3{font-size:1.05rem;font-weight:800;margin-bottom:6px}.md p{color:var(--tm);margin-bottom:12px;line-height:1.5}
@media(min-width:600px){.lg{grid-template-columns:repeat(auto-fill,minmax(72px,1fr))}.vg{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}.cw{max-width:480px}}
@media(max-width:380px){.lg{grid-template-columns:repeat(5,1fr);gap:5px}.vg{grid-template-columns:repeat(2,1fr)}.wex .wu{font-size:3rem}.wex .wl{font-size:2.2rem}}
</style>
</head>
<body>
<div id="app">
  <header class="hdr" id="header">
    <button class="hb" id="backBtn" style="visibility:hidden" onclick="goBack()">←</button>
    <h1 id="titleH">✏️ Writing & Words</h1>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="stars-badge" id="starsBadge">⭐ 0</span>
      <button class="hb" id="sndBtn" onclick="toggleSound()">🔊</button>
    </div>
  </header>
  <main class="mc" id="mc"></main>
</div>
<div class="bn2" id="bottomNav"><div class="ni">
  <button class="nv active" onclick="navTo('home')" data-nav="home"><span class="ni2">🏠</span>خانه</button>
  <button class="nv" onclick="navTo('letters')" data-nav="letters"><span class="ni2">✏️</span>نوشتن</button>
  <button class="nv" onclick="navTo('vocab')" data-nav="vocab"><span class="ni2">📚</span>لغات</button>
  <button class="nv" onclick="navTo('spelling')" data-nav="spelling"><span class="ni2">🧩</span>بازی</button>
  <button class="nv" onclick="navTo('stories')" data-nav="stories"><span class="ni2">📖</span>داستان</button>
</div></div>
<div class="mo" id="mo"><div class="md" id="md2"></div></div>
<div class="reward-overlay" id="rewardOverlay"><div class="reward-card" id="rewardCard"></div></div>

<script>
// ====================================================================
// iOS-COMPATIBLE AUDIO SYSTEM
// ====================================================================
var audioReady = false;
var englishVoice = null;
var speechRate = 0.8;

function loadVoices() {
  try {
    var voices = speechSynthesis.getVoices();
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang.indexOf('en') === 0) {
        englishVoice = voices[i];
        if (voices[i].lang === 'en-US' || voices[i].lang === 'en-GB') break;
      }
    }
  } catch(e) {}
}

if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function initAudio() {
  if (audioReady) return;
  audioReady = true;
  try {
    loadVoices();
    var u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    u.lang = 'en-US';
    u.rate = 10;
    speechSynthesis.speak(u);
  } catch(e) {}
}

function speak(text, rate) {
  if (!state.soundOn || !text || !text.trim()) return;
  if (!audioReady) initAudio();
  try { speechSynthesis.cancel(); } catch(e) {}
  setTimeout(function() {
    try {
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = rate || speechRate;
      u.pitch = 1.1;
      if (englishVoice) u.voice = englishVoice;
      speechSynthesis.speak(u);
    } catch(e) {}
  }, 120);
}

// ====================================================================
// STARS SYSTEM
// ====================================================================
function addStars(n) {
  state.stars = (state.stars || 0) + n;
  save();
  updateStarsDisplay();
  var milestones = [10, 25, 50, 100, 200];
  for (var i = 0; i < milestones.length; i++) {
    if (state.stars >= milestones[i] && (state.stars - n) < milestones[i]) {
      showReward(milestones[i]);
      break;
    }
  }
}

function updateStarsDisplay() {
  var el = document.getElementById('starsBadge');
  if (el) el.textContent = '⭐ ' + (state.stars || 0);
}

function showReward(count) {
  var el = document.getElementById('rewardCard');
  el.innerHTML = '<div class="rstar">🌟</div><h3>آفرین!</h3><p>' + count + ' ستاره جمع کردی!</p>'
    + '<button class="btn bp bl" style="width:100%" onclick="hideReward()">ادامه بده!</button>';
  document.getElementById('rewardOverlay').classList.add('show');
}

function hideReward() {
  document.getElementById('rewardOverlay').classList.remove('show');
}

// ====================================================================
// DATA
// ====================================================================
var LETTERS = [
  {id:'a',l:'a',u:'A',steps:['Start with a curve','Close it like a circle','Add a small line down'],'tip':'نصف دایره + خط کوچک'},
  {id:'b',l:'b',u:'B',steps:['Draw a tall line down','Make a bump forward','Make another smaller bump'],'tip':'خط عمودی + دو شکم'},
  {id:'c',l:'c',u:'C',steps:['Make a big open curve','Like an open circle'],'tip':'مثل هلال ماه'},
  {id:'d',l:'d',u:'D',steps:['Make a small circle first','Draw a tall line up'],'tip':'دایره + خط بلند'},
  {id:'e',l:'e',u:'E',steps:['Draw a small e shape','Add a line across the middle'],'tip':'مثل ۳ برعکس'},
  {id:'f',l:'f',u:'F',steps:['Draw a tall line down','Add a line at the top','Add a line in the middle'],'tip':'خط + دو دست'},
  {id:'g',l:'g',u:'G',steps:['Make a circle','Add a tail going down'],'tip':'دایره + دم'},
  {id:'h',l:'h',u:'H',steps:['Draw a tall line down','Draw another tall line','Connect in the middle'],'tip':'دو خط + پل'},
  {id:'i',l:'i',u:'I',steps:['Draw a short line down','Add a dot on top'],'tip':'نقطه + خط'},
  {id:'j',l:'j',u:'J',steps:['Draw a line down','Curve to the left','Add a dot on top'],'tip':'قلاب + نقطه'},
  {id:'k',l:'k',u:'K',steps:['Draw a tall line down','Make a V shape on the side'],'tip':'خط + V'},

var navMap = {home:['home'],letters:['letters','letterWrite'],vocab:['vocab','cat','wd'],spelling:['spelling','match'],stories:['stories','storyRead'],wordWrite:['wordWrite','wwCanvas']};

function navTo(s) {
  if (state.screen !== s) state.history.push(state.screen);
  state.screen = s;
  render();
  updateNav();
  updateBack();
  window.scrollTo(0,0);
}

function goBack() {
  if (state.history.length) {
    state.screen = state.history.pop();
    render();
    updateNav();
    updateBack();
  }
}

function updateNav() {
  var els = document.querySelectorAll('.nv');
  for (var i = 0; i < els.length; i++) {
    var n = els[i].getAttribute('data-nav');
    var screens = navMap[n] || [];
    var isActive = screens.indexOf(state.screen) >= 0;
    if (isActive) els[i].classList.add('active');
    else els[i].classList.remove('active');
  }
  var nav = document.getElementById('bottomNav');
  nav.style.display = state.screen === 'welcome' ? 'none' : '';
  var hdr = document.getElementById('header');
  hdr.style.display = state.screen === 'welcome' ? 'none' : '';
}

function updateBack() {
  document.getElementById('backBtn').style.visibility = state.history.length > 0 ? 'visible' : 'hidden';
}

function toggleSound() {
  state.soundOn = !state.soundOn;
  document.getElementById('sndBtn').textContent = state.soundOn ? '🔊' : '🔇';
}

function showMod(h) { document.getElementById('md2').innerHTML = h; document.getElementById('mo').classList.add('show'); }
function hideMod() { document.getElementById('mo').classList.remove('show'); }

var canvasRefs = {};

function initCanvas(wrapId, guideText) {
  var wrap = document.getElementById(wrapId);
  if (!wrap) return;
  var cvs = wrap.querySelector('canvas');
  if (!cvs) return;
  var w = wrap.clientWidth;
  var h = wrap.clientHeight;
  var dpr = window.devicePixelRatio || 1;
  cvs.width = w * dpr;
  cvs.height = h * dpr;
  var c = cvs.getContext('2d');
  c.scale(dpr, dpr);
  cvs.style.width = w + 'px';
  cvs.style.height = h + 'px';
  var drawing = false, lastP = null;

  function drawGuide() {
    c.clearRect(0,0,w,h);
    c.strokeStyle = 'rgba(74,111,165,0.08)'; c.lineWidth = 1; c.setLineDash([]);
    c.beginPath(); c.moveTo(0,h*0.33); c.lineTo(w,h*0.33); c.stroke();
    c.setLineDash([4,4]); c.beginPath(); c.moveTo(0,h*0.5); c.lineTo(w,h*0.5); c.stroke();
    c.setLineDash([]); c.beginPath(); c.moveTo(0,h*0.67); c.lineTo(w,h*0.67); c.stroke();
    var sz = Math.min(w,h)*0.6;
    c.font = 'bold ' + sz + 'px Nunito';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillStyle = 'rgba(74,111,165,0.1)';
    c.fillText(guideText, w/2, h/2);
  }

  function showFull() {
    drawGuide();
    var sz = Math.min(w,h)*0.6;
    c.font = 'bold ' + sz + 'px Nunito';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillStyle = 'rgba(74,111,165,0.25)';
    c.fillText(guideText, w/2, h/2);
  }

  function getPos(e) {
    var r = cvs.getBoundingClientRect();
    var t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }

  function sd(e) { e.preventDefault(); drawing = true; lastP = getPos(e); }
  function dd(e) {
    e.preventDefault();
    if (!drawing) return;
    var p = getPos(e);
    c.beginPath(); c.moveTo(lastP.x, lastP.y); c.lineTo(p.x, p.y);
    c.strokeStyle = '#E8856C'; c.lineWidth = 5; c.lineCap = 'round'; c.lineJoin = 'round';
    c.stroke(); lastP = p;
  }
  function ed(e) { if(e) e.preventDefault(); drawing = false; }

  cvs.addEventListener('mousedown',sd); cvs.addEventListener('mousemove',dd);
  cvs.addEventListener('mouseup',ed); cvs.addEventListener('mouseleave',ed);
  cvs.addEventListener('touchstart',sd,{passive:false}); cvs.addEventListener('touchmove',dd,{passive:false});
  cvs.addEventListener('touchend',ed,{passive:false});

  drawGuide();
  canvasRefs[wrapId] = { clear: drawGuide, show: showFull };
}

function getAllWords() {
  var all = [];
  for (var i = 0; i < CATS.length; i++) {
    for (var j = 0; j < CATS[i].words.length; j++) {
      all.push(CATS[i].words[j]);
    }
  }
  return all;
}

function findWordEmoji(w) {
  var all = getAllWords();
  for (var i = 0; i < all.length; i++) { if (all[i].w === w) return all[i].e; }
  return '📝';
}

// RENDER
function render() {
  canvasRefs = {};
  var mc = document.getElementById('mc');
  var h = '';
  switch(state.screen) {
    case 'welcome': h = RWelcome(); break;
    case 'home': h = RH(); break;
    case 'letters': h = RL(); break;
    case 'letterWrite': h = RLW(); break;
    case 'wordWrite': h = RWW(); break;
    case 'wwCanvas': h = RWWC(); break;
    case 'vocab': h = RV(); break;
    case 'cat': h = RC(); break;
    case 'wd': h = RWD(); break;
    case 'spelling': h = RSp(); break;
    case 'match': h = RMatch(); break;
    case 'stories': h = RSt(); break;
    case 'storyRead': h = RStR(); break;
    default: h = RH();
  }
  mc.innerHTML = h;
  updateStarsDisplay();
  if (state.screen === 'letterWrite' && state.selLetter) {
    setTimeout(function() {
      initCanvas('upperWrap', state.selLetter.u);
      initCanvas('lowerWrap', state.selLetter.l);
    }, 100);
  }
  if (state.screen === 'wwCanvas' && state.selWord) {
    setTimeout(function() { initCanvas('wordWrap', state.selWord); }, 100);
  }
}

function RLW(){
  var l=state.selLetter;if(!l)return'<p>حرفی انتخاب نشده</p>';
  var idx=LETTERS.indexOf(l),prev=idx>0?LETTERS[idx-1]:null,next=idx<LETTERS.length-1?LETTERS[idx+1]:null,done=lD(l.id);
  var allW=getAllWords(),exW=[];
  for(var i=0;i<allW.length&&exW.length<5;i++) if(allW[i].w.toLowerCase().charAt(0)===l.l) exW.push(allW[i]);

  h+='<div class="wex"><span class="wu">'+l.u+'</span><span class="wl">'+l.l+'</span></div>';
  h+='<button class="wpb" onclick="speak(\''+l.u+' '+l.l+'\')">🔊</button>';

function startSpell(mode){
  var words=SPELL_WORDS.slice().sort(function(){return Math.random()-0.5;});
  var qs=[],cnt=Math.min(10,words.length);
  for(var i=0;i<cnt;i++){var w=words[i];
    if(mode==='missing'){var letters=w.w.split(''),bl=[];for(var j=0;j<letters.length;j++)if(/[a-z]/.test(letters[j]))bl.push(j);if(!bl.length)continue;var bI=bl[Math.floor(Math.random()*bl.length)],correct=letters[bI],opts=[correct];while(opts.length<4){var r='abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random()*26)];if(opts.indexOf(r)<0)opts.push(r);}opts.sort(function(){return Math.random()-0.5;});qs.push({t:'missing',w:w.w,bi:bI,c:correct,o:opts,e:w.e,f:w.f});}
    else if(mode==='hear'){var opts=[w.w];SPELL_WORDS.filter(function(x){return x.w!==w.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3).forEach(function(o){opts.push(o.w);});opts.sort(function(){return Math.random()-0.5;});qs.push({t:'hear',w:w.w,o:opts,e:w.e,f:w.f});}
    else if(mode==='first'){var correct=w.w[0],opts=[correct];while(opts.length<4){var r='abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random()*26)];if(opts.indexOf(r)<0)opts.push(r);}opts.sort(function(){return Math.random()-0.5;});qs.push({t:'first',w:w.w,c:correct,o:opts,e:w.e,f:w.f});}
    else if(mode==='emoji'){var opts=[w.w];SPELL_WORDS.filter(function(x){return x.w!==w.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3).forEach(function(o){opts.push(o.w);});opts.sort(function(){return Math.random()-0.5;});qs.push({t:'emoji',w:w.w,o:opts,e:w.e,f:w.f});}
  }
  state.spellState={m:mode,qs:qs,qi:0,sc:0,ans:[]};state.matchState=null;render();
}

function cancelSpell(){state.spellState=null;state.matchState=null;render();}

  else if(q.t==='first'){var oh='';for(var i=0;i<q.o.length;i++)oh+='<button class="spopt" data-a="'+q.o[i]+'" data-c="'+q.c+'" onclick="ansSp(this)">'+q.o[i]+'</button>';main='<div class="spemoji">'+q.e+'</div><div style="font-size:.78rem;color:var(--tm);margin-bottom:3px">'+q.f+'</div><div style="font-size:1.6rem;font-weight:900;color:var(--tl);margin-bottom:8px;letter-spacing:4px">? '+q.w.slice(1)+'</div><div style="font-size:.75rem;color:var(--tm);margin-bottom:6px">حرف اول چیه؟</div><div class="spopts">'+oh+'</div>';}
  else if(q.t==='emoji'){var oh='';for(var i=0;i<q.o.length;i++)oh+='<button class="spopt" data-a="'+q.o[i]+'" data-c="'+q.w+'" onclick="ansSp(this)" style="font-size:.9rem;padding:11px 14px">'+q.o[i]+'</button>';main='<div class="spemoji" style="font-size:4rem">'+q.e+'</div><div style="font-size:.88rem;color:var(--tm);margin-bottom:12px">این چیه؟</div><div class="spopts">'+oh+'</div>';}
  return'<div class="sptb"><button class="btn bs sm" onclick="cancelSpell()">← برگشت</button><span style="font-size:.75rem;color:var(--tl)">'+(ss.qi+1)+'/'+ss.qs.length+'</span></div><div class="spc"><div class="spprog">'+dots+'</div>'+main+'</div>';

function ansSp(btn){

// MATCH GAME
function startMatch(){
  var words=SPELL_WORDS.slice().sort(function(){return Math.random()-0.5;});
  var qs=[],cnt=Math.min(8,words.length);
  for(var i=0;i<cnt;i++){var w=words[i],opts=[w];
    SPELL_WORDS.filter(function(x){return x.w!==w.w&&x.e;}).sort(function(){return Math.random()-0.5;}).slice(0,3).forEach(function(o){opts.push(o);});
    opts.sort(function(){return Math.random()-0.5;});
    var correctIdx=-1;for(var j=0;j<opts.length;j++)if(opts[j].w===w.w)correctIdx=j;
    qs.push({word:w.w,emoji:w.e,farsi:w.f,opts:opts,ci:correctIdx});
  }
  state.matchState={qs:qs,qi:0,sc:0,ans:[]};state.spellState=null;render();
}

function ansMatch(btn,sel,correct){

  var h='<div class="strf"><h3>'+s.e+' '+s.t+' — '+s.f+'</h3>';
  h+='<div class="spctrl"><label>🔊 سرعت:</label><input type="range" min="0.4" max="1.2" step="0.1" value="'+speechRate+'" oninput="speechRate=parseFloat(this.value);document.getElementById(\'spdVal\').textContent=this.value"><span id="spdVal">'+speechRate+'</span></div>';
  for(var i=0;i<s.lines.length;i++){var safeLine=s.lines[i].replace(/'/g,"\\'");h+='<div class="strline" onclick="speak(\''+safeLine+'\')"><span class="slp">🔊</span><span>'+s.lines[i]+'</span></div>';}
  h+='<button class="btn ba" style="width:100%;margin:12px 0" onclick="readStory()">🔊 کل داستان</button>';
  for(var qi=0;qi<s.qs.length;qi++){var q=s.qs[qi],answered=state.storyAns[qi]!==undefined;
    h+='<div class="strq"><h4>❓ '+q.q+'</h4>';
    for(var oi=0;oi<q.o.length;oi++){var cls='qo';if(answered){if(oi===q.a)cls+=' corr';else if(oi===state.storyAns[qi]&&oi!==q.a)cls+=' wro';cls+=' dis';}h+='<button class="'+cls+'" onclick="ansStory('+qi+','+oi+','+q.a+')">'+q.o[oi]+'</button>';}
    h+='</div>';}
  h+='<div class="nb" style="margin-top:12px"><button class="btn bs" onclick="navTo(\'stories\')">← برگشت</button><button class="btn bok" onclick="stM('+s.id+');navTo(\'stories\')">✓ تمام شد</button></div></div>';
  return h;
}

function ansStory(qi,sel,correct){state.storyAns[qi]=sel;if(sel===correct)speak('Good!');else speak('Try again');render();}

function readStory(){var s=state.selStory;if(!s)return;var idx=0;function nx(){if(idx<s.lines.length){speak(s.lines[idx]);idx++;setTimeout(nx,Math.max(2000,s.lines[idx-1].split(' ').length*600));}}nx();}

// INIT
// ====================================================================
document.getElementById('mo').addEventListener('click',function(e){if(e.target.id==='mo')hideMod();});
document.getElementById('rewardOverlay').addEventListener('click',function(e){if(e.target.id==='rewardOverlay')hideReward();});

// iOS: warm up audio on any touch
document.addEventListener('touchstart',function(){if(!audioReady)initAudio();},{once:true});
document.addEventListener('click',function(){if(!audioReady)initAudio();},{once:true});

render();updateNav();updateBack();
</script>
