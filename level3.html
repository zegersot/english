<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Level 3 — Reading & Writing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F2F0F5;--sf:#FFF;--p:#5B4A8A;--pl:#EDE8F5;--pd:#3D2E6B;--ac:#E87C6C;--al:#FDF0EC;--gd:#D4A650;--gl:#FDF6E3;--tx:#2D2926;--tm:#5A524C;--tl:#8A837D;--ok:#6BAF7E;--okl:#EDF7EF;--bd:#D96B6B;--r:16px;--rs:10px;--rl:24px;--sh:0 2px 12px rgba(45,41,38,.08);--shl:0 8px 32px rgba(45,41,38,.12);--tr:.3s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;flex-direction:column;max-width:900px;margin:0 auto}
.hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--sf);border-bottom:1px solid rgba(0,0,0,.05);position:sticky;top:0;z-index:100}
.hdr h1{font-size:.88rem;font-weight:800;color:var(--p)}
.hb{background:var(--pl);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--tr);color:var(--p)}
.sb2{background:var(--gl);color:var(--gd);padding:3px 9px;border-radius:16px;font-size:.72rem;font-weight:800}
.mc{flex:1;padding:12px 12px 100px}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes cl{0%{transform:scale(1)}30%{transform:scale(1.15) rotate(-3deg)}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1)}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.st{font-size:1rem;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.btn{padding:10px 16px;border-radius:var(--rs);border:none;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;transition:var(--tr);display:inline-flex;align-items:center;gap:5px}.btn:active{transform:scale(.96)}
.bp{background:var(--p);color:#fff;flex:1;justify-content:center}.bs{background:var(--pl);color:var(--p);flex:1;justify-content:center}
.ba{background:var(--ac);color:#fff;flex:1;justify-content:center}.bg{background:var(--gd);color:#fff;flex:1;justify-content:center}
.bok{background:var(--ok);color:#fff;flex:1;justify-content:center}
.bl{padding:13px 24px;font-size:.95rem;border-radius:var(--r)}.sm{padding:6px 12px;font-size:.75rem;flex:none}
.nb{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.hh{text-align:center;padding:24px 14px;background:linear-gradient(145deg,var(--pl),var(--al));border-radius:var(--rl);margin-bottom:18px;animation:fi .5s ease}
.hh h2{font-size:1.15rem;font-weight:900;margin-bottom:3px;color:var(--pd)}.hh p{font-size:.8rem;color:var(--tm);line-height:1.5}
.pg{display:grid;gap:10px}
.pc{background:var(--sf);border-radius:var(--r);padding:13px;box-shadow:var(--sh);cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:10px;border:2px solid transparent}.pc:active{transform:scale(.98)}
.pi{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.pinf{flex:1;min-width:0}.pinf h3{font-size:.85rem;font-weight:800;margin-bottom:2px}.pinf p{font-size:.68rem;color:var(--tl)}
.pbar{width:100%;height:4px;background:#eee;border-radius:2px;margin-top:4px;overflow:hidden}.pbf{height:100%;border-radius:2px;transition:width .5s ease}
.pbadge{font-size:.54rem;padding:2px 6px;border-radius:16px;font-weight:700;white-space:nowrap}
.lb{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:.6rem;font-weight:800;margin-left:4px}
.lb1{background:#E8F4F0;color:#3D7B6F}.lb2{background:#E8EFF8;color:#4A6FA5}.lb3{background:#FDF6E3;color:#D4A650}.lb4{background:#FDF0EC;color:#E8856C}.lb5{background:#EDF7EF;color:#6BAF7E}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.sc{background:var(--sf);border-radius:var(--r);padding:11px 5px;text-align:center;box-shadow:var(--sh)}
.sn{font-size:1.2rem;font-weight:900;color:var(--p)}.sl{font-size:.56rem;color:var(--tl);margin-top:2px}
.pc-detail{background:var(--sf);border-radius:var(--r);padding:16px;box-shadow:var(--shl);animation:fi .4s ease}
.lesson-example{background:var(--pl);border-radius:var(--rs);padding:10px;margin-bottom:6px;font-size:.88rem;line-height:1.8;cursor:pointer;transition:var(--tr)}.lesson-example:active{background:var(--p);color:#fff}
.lesson-fa{font-size:.72rem;color:var(--tm);direction:rtl;text-align:right;margin-top:2px;margin-bottom:10px}
.tense-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin:8px 0}
.tense-cell{background:var(--pl);border-radius:var(--rs);padding:8px 4px;text-align:center;font-size:.75rem;font-weight:700;cursor:pointer}.tense-cell:active{background:var(--p);color:#fff}
.tense-header{background:var(--p);color:#fff;font-weight:800}
.spc{background:var(--sf);border-radius:var(--rl);padding:16px 12px;box-shadow:var(--shl);text-align:center;animation:fi .5s ease;margin-bottom:12px}
.spopts{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px}
.spopt{padding:11px 18px;border-radius:var(--rs);border:3px solid #eee;background:var(--sf);font-family:inherit;font-size:1rem;font-weight:800;cursor:pointer;transition:var(--tr);min-width:44px;-webkit-user-select:none;user-select:none}
.spopt:active{transform:scale(.95)}.spopt.ok{background:var(--ok)!important;color:#fff!important;border-color:var(--ok)!important;animation:pop .4s ease}.spopt.bad{background:#FDECEC!important;border-color:var(--bd)!important;animation:shake .4s ease}.spopt.dis{pointer-events:none;opacity:.5}
.spprog{display:flex;gap:3px;justify-content:center;margin-bottom:10px}
.spd{width:8px;height:8px;border-radius:50%;background:#ddd}.spd.cur{background:var(--p);transform:scale(1.4)}.spd.ok2{background:var(--ok)}.spd.fl{background:var(--bd)}
.sptb{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sent-slots{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;min-height:44px}
.sent-slot{padding:8px 10px;border-radius:8px;border:2px dashed #ddd;background:#fff;font-weight:800;font-size:.85rem;color:var(--p);cursor:pointer;transition:var(--tr)}
.sent-slot.filled{border-style:solid;border-color:var(--p);background:var(--pl)}.sent-slot.wrong{border-color:var(--bd);background:#FDECEC;animation:shake .4s ease}
.sent-words{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.sent-word{padding:8px 12px;border-radius:8px;border:2px solid #eee;background:var(--sf);font-family:inherit;font-weight:800;font-size:.85rem;color:var(--p);cursor:pointer;transition:var(--tr)}
.sent-word:active{transform:scale(.95)}.sent-word.used{opacity:.2;pointer-events:none}
.conv-left{background:var(--pl);border-radius:var(--rs) var(--rs) var(--rs) 0;padding:8px 12px;font-size:.85rem;font-weight:600;max-width:80%;margin-bottom:8px;cursor:pointer;transition:var(--tr)}.conv-left:active{background:var(--p);color:#fff}
.conv-right{background:var(--okl);border-radius:var(--rs) var(--rs) 0 var(--rs);padding:8px 12px;font-size:.85rem;font-weight:600;max-width:80%;margin-left:auto;margin-bottom:8px;text-align:right;cursor:pointer}
.conv-blank{background:#fff;border:2px dashed var(--p);border-radius:var(--rs);padding:8px 12px;font-size:.82rem;color:var(--p);font-weight:700;cursor:pointer;display:inline-block}
.result-card{background:var(--sf);border-radius:var(--rl);padding:24px 16px;box-shadow:var(--shl);text-align:center;animation:fi .5s ease;margin-bottom:12px}
.result-card h3{font-size:1.15rem;font-weight:900;margin-bottom:4px}.result-card p{color:var(--tm);font-size:.85rem;margin-bottom:14px}
.qo{display:block;width:100%;padding:10px;border-radius:var(--rs);border:2px solid #eee;background:var(--sf);font-family:inherit;font-size:.88rem;font-weight:700;color:var(--tx);cursor:pointer;margin-bottom:5px;text-align:right;transition:var(--tr)}.qo:active{transform:scale(.98)}.qo.corr{border-color:var(--ok);background:var(--okl);color:var(--ok)}.qo.wro{border-color:var(--bd);background:#FDECEC;color:var(--bd)}.qo.dis{pointer-events:none;opacity:.6}
.vocab-cat{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.vocab-card{background:var(--sf);border-radius:var(--r);padding:14px;box-shadow:var(--sh);cursor:pointer;transition:var(--tr);text-align:center;border:2px solid transparent}.vocab-card:active{transform:scale(.97)}
.vocab-card .vc-title{font-size:.82rem;font-weight:800;margin-top:6px}.vocab-card .vc-count{font-size:.65rem;color:var(--tl)}
.word-item{background:var(--sf);border-radius:var(--r);padding:12px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px;margin-bottom:8px;animation:fi .3s ease;border:2px solid transparent;cursor:pointer;transition:var(--tr)}.word-item:active{border-color:var(--p)}
.wi-emoji{font-size:1.8rem}.wi-text h4{font-size:.88rem;font-weight:800}.wi-text p{font-size:.7rem;color:var(--tl);direction:rtl;text-align:right}
.story-line{background:var(--pl);border-radius:8px;padding:10px 14px;margin-bottom:4px;font-size:.92rem;cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:8px}.story-line:active{background:var(--p);color:#fff}
.story-line .sl-ico{font-size:.8rem;flex-shrink:0;opacity:.6}
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.section-card{background:var(--sf);border-radius:var(--rl);padding:20px 14px;box-shadow:var(--shl);text-align:center;cursor:pointer;transition:var(--tr);border:3px solid transparent}.section-card:active{transform:scale(.97);border-color:var(--p)}
.section-card .sc-emoji{font-size:2.2rem;margin-bottom:6px}.section-card h3{font-size:.9rem;font-weight:900;margin-bottom:3px}.section-card p{font-size:.68rem;color:var(--tl)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.mem-card{aspect-ratio:1;background:var(--pl);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;cursor:pointer;transition:all .3s;border:2px solid transparent;user-select:none}.mem-card:active{transform:scale(.95)}.mem-card.flipped{background:var(--sf);border-color:var(--p);font-size:.82rem;animation:pop .3s ease}.mem-card.matched{background:var(--okl);border-color:var(--ok);pointer-events:none}
.gm-desc{background:var(--pl);border-radius:var(--rs);padding:8px 12px;margin:6px 0 0;font-size:.68rem;color:var(--tm);line-height:1.4;direction:rtl;text-align:right}
.bn2{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid rgba(0,0,0,.06);padding:5px 0;padding-bottom:max(5px,env(safe-area-inset-bottom));z-index:100}
.bn2 .ni{display:flex;gap:1px;max-width:520px;width:100%;justify-content:space-around;margin:0 auto}
.nv{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 6px;border-radius:10px;background:none;border:none;cursor:pointer;font-family:inherit;transition:var(--tr);color:var(--tl);font-size:.52rem;font-weight:700;min-width:48px}.nv .ni2{margin-bottom:1px;font-size:1rem}.nv.active{color:var(--p);background:var(--pl)}
.ro{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:300}.ro.show{display:flex}
.rc{background:var(--sf);border-radius:var(--rl);padding:28px 22px;text-align:center;animation:cl .8s ease;max-width:280px;width:90%}.rc h3{font-size:1.2rem;font-weight:900;margin-bottom:5px}.rc p{color:var(--tm);font-size:.85rem;margin-bottom:14px}
@media(min-width:600px){.tense-grid{gap:8px}.vocab-cat{grid-template-columns:repeat(3,1fr)}.section-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:380px){.spopt{padding:9px 14px;font-size:.88rem}.sent-word,.sent-slot{padding:7px 9px;font-size:.78rem}.vocab-cat{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
<header class="hdr">
<button class="hb" id="backBtn" style="visibility:hidden" onclick="goBack()">←</button>
<h1>📚 Level 3</h1>
<div style="display:flex;align-items:center;gap:5px">
<span class="sb2" id="starsBadge">⭐ <span id="starsNum">0</span></span>
<button class="hb" id="sndBtn" onclick="toggleSound()">🔊</button>
</div>
</header>
<main class="mc" id="mc"></main>
</div>
<div class="bn2"><div class="ni">
<button class="nv active" onclick="navTo('home')" data-nav="home"><span class="ni2">🏠</span>خانه</button>
<button class="nv" onclick="navTo('reading')" data-nav="reading"><span class="ni2">📖</span>خواندن</button>
<button class="nv" onclick="navTo('writing')" data-nav="writing"><span class="ni2">✏️</span>نوشتن</button>
<button class="nv" onclick="navTo('words')" data-nav="words"><span class="ni2">📚</span>کلمات</button>
<button class="nv" onclick="navTo('games')" data-nav="games"><span class="ni2">🎮</span>بازی</button>
</div></div>
<div class="ro" id="ro"><div class="rc" id="rc2"></div></div>
<script>
var SR=0.85,EV=null;
function loadV(){try{var v=speechSynthesis.getVoices();if(!v||!v.length)return;EV=null;var n=['Google US English','Google UK English Female','Samantha','Daniel'];for(var p=0;p<n.length;p++)for(var i=0;i<v.length;i++)if(v[i].name===n[p]||v[i].voiceURI===n[p]){EV=v[i];return}for(var i=0;i<v.length;i++)if(v[i].lang==='en-US'){EV=v[i];return}for(var i=0;i<v.length;i++)if(v[i].lang.indexOf('en')===0){EV=v[i];return}}catch(e){}}
if(typeof speechSynthesis!=='undefined'){speechSynthesis.onvoiceschanged=loadV;loadV();setTimeout(loadV,500);setTimeout(loadV,2000)}
function speak(t,r){if(!S.soundOn||!t)return;try{speechSynthesis.cancel()}catch(e){}setTimeout(function(){try{var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=r||SR;if(EV)u.voice=EV;speechSynthesis.speak(u)}catch(e){}},150)}

var S={screen:'home',hist:[],soundOn:true,stars:0,gView:'menu',qS:null,lR:null,selSent:null,selTense:null,selConv:null,selRead:null,selStory:null,selCat:null,sentSt:null,sbQ:null,sbI:null,sbSt:null,rAns:{},stAns:{},stCh:0,progress:JSON.parse(localStorage.getItem('lv3p')||'{}')};
function sv(){try{localStorage.setItem('lv3p',JSON.stringify(S.progress));localStorage.setItem('lv3s',(S.stars||0).toString())}catch(e){}}
S.stars=parseInt(localStorage.getItem('lv3s')||'0');
function mD(k){return S.progress[k]||false};function mS(k){S.progress[k]=true;sv();addS(2)}
function addS(n){S.stars=(S.stars||0)+n;sv();uS();var ms=[10,25,50,100,200];for(var i=0;i<ms.length;i++){if(S.stars>=ms[i]&&(S.stars-n)<ms[i]){showR(ms[i]);break}}}
function uS(){var el=document.getElementById('starsNum');if(el)el.textContent=S.stars||0}
function showR(c){document.getElementById('rc2').innerHTML='<div style="font-size:3rem;margin-bottom:8px">🏆</div><h3>آفرین!</h3><p>'+c+' ستاره!</p><button class="btn bp bl" style="width:100%" onclick="document.getElementById(\'ro\').classList.remove(\'show\')">ادامه</button>';document.getElementById('ro').classList.add('show')}
function gL(p){if(p>=90)return{n:5,l:'استاد',c:'lb5'};if(p>=70)return{n:4,l:'عالی',c:'lb4'};if(p>=50)return{n:3,l:'متوسط',c:'lb3'};if(p>=25)return{n:2,l:'خوب',c:'lb2'};if(p>0)return{n:1,l:'شروع',c:'lb1'};return{n:0,l:'جدید',c:'lb1'}}
function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function se(t){return(t||'').replace(/'/g,"\\'")}
/* FIX: single shuffle helper */
function mkQ(q,opts,ans){var so=shuf(opts);return{q:q,opts:so,ci:so.indexOf(ans)}}

function mcI(c,bg,ico,t,d,done,total,barC,pct){var lv=gL(pct);return '<div class="pc" onclick="'+c+'"><div class="pi" style="background:'+bg+'">'+ico+'</div><div class="pinf"><h3>'+t+'<span class="lb '+lv.c+'">'+lv.l+'</span></h3><p>'+d+'</p><div class="pbar"><div class="pbf" style="width:'+pct+'%;background:'+barC+'"></div></div></div>'+(done!=null?'<span class="pbadge" style="color:'+barC+';background:'+bg+'">'+done+'/'+total+'</span>':'')+'</div>'}

var navMap={home:['home'],reading:['reading','phonics','phonD','tenses','tenseD','sentences','sentD','convos','convD','stories','storyD','readpass','readD'],writing:['writing'],words:['words','wordD'],games:['games']};
function navTo(s){if(S.screen!==s)S.hist.push(S.screen);S.screen=s;S.gView='menu';S.qS=null;S.lR=null;S.sentSt=null;S.sbQ=null;if(s==='words')S.selCat=null;if(s==='phonics')S.selPhonics=null;if(s==='readpass'){S.selRead=null;S.rAns={}}if(s==='stories'){S.stAns={};S.stCh=0}render();uNav();uB();window.scrollTo(0,0)}
function goBack(){if(S.hist.length){S.screen=S.hist.pop();S.gView='menu';S.qS=null;render();uNav();uB()}}
function uNav(){var els=document.querySelectorAll('.nv');for(var i=0;i<els.length;i++){var n=els[i].getAttribute('data-nav');els[i].classList.toggle('active',(navMap[n]||[]).indexOf(S.screen)>=0)}}
function uB(){document.getElementById('backBtn').style.visibility=S.hist.length>0?'visible':'hidden'}
function toggleSound(){S.soundOn=!S.soundOn;document.getElementById('sndBtn').textContent=S.soundOn?'🔊':'🔇'}

/* ==================== DATA ==================== */
var PHONICS=[
{pat:'sh',sound:'مثل «ش» فارسی',words:['ship','shop','she','shirt','shoes','fish'],ex:'She sells shoes in the shop.'},
{pat:'ch',sound:'مثل «چ» فارسی',words:['chair','child','cheese','teacher','lunch'],ex:'The child sat on the chair.'},
{pat:'th',sound:'زبان بین دندان‌ها',words:['the','this','that','think','three','math'],ex:'I think this is that.'},
{pat:'wh',sound:'مثل «و» فارسی',words:['what','when','where','why','white','wheel'],ex:'Where is the white wheel?'},
{pat:'ck',sound:'مثل «ک» فارسی',words:['back','duck','chick','sock','neck','trick'],ex:'The duck is on my back.'},
{pat:'oo',sound:'مثل «او» فارسی',words:['moon','food','school','book','cool','zoo'],ex:'The moon is over the school.'},
{pat:'ee',sound:'مثل «ای» فارسی',words:['tree','see','bee','green','sleep','three'],ex:'I see a bee in the tree.'},
{pat:'ea',sound:'مثل «ای» فارسی',words:['eat','read','sea','tea','beach'],ex:'I eat and read by the sea.'},
{pat:'ai/ay',sound:'مثل «ای» فارسی',words:['rain','train','wait','play','day','say'],ex:'Wait for the train in the rain.'},
{pat:'ou/ow',sound:'مثل «او» فارسی',words:['house','mouse','cloud','cow','town','now'],ex:'The mouse ran out of the house.'},
{pat:'igh',sound:'مثل «ای» فارسی',words:['night','light','right','high','fight','sight'],ex:'The light is bright at night.'},
{pat:'ph',sound:'مثل «ف» فارسی',words:['phone','photo','elephant','dolphin','alphabet'],ex:'I took a photo of the elephant.'},
{pat:'er/ur',sound:'مثل «ر» فارسی',words:['teacher','nurse','bird','turn','hurt','burn'],ex:'The nurse helps the teacher.'},
{pat:'tion',sound:'مثل «شن» فارسی',words:['station','question','nation','action','vacation'],ex:'The train is at the station.'}
];

var TENSES=[
{v:'eat',fa:'خوردن',p:'ate',f:'will eat',eP:'I eat breakfast every day.',ePa:'I ate breakfast at eight.',eF:'I will eat breakfast soon.'},
{v:'go',fa:'رفتن',p:'went',f:'will go',eP:'I go to school by bus.',ePa:'I went to the park.',eF:'I will go to the zoo.'},
{v:'see',fa:'دیدن',p:'saw',f:'will see',eP:'I see my friend every day.',ePa:'I saw a rainbow.',eF:'I will see you tomorrow.'},
{v:'have',fa:'داشتن',p:'had',f:'will have',eP:'I have a cat.',ePa:'I had a dog before.',eF:'I will have a new toy.'},
{v:'play',fa:'بازی کردن',p:'played',f:'will play',eP:'I play football.',ePa:'I played in the park.',eF:'I will play with you.'},

/* ===== GAMES — ALL using mkQ() for correct shuffling ===== */
function RGM(){return'<div class="st">🎮 بازی‌ها</div><div class="pg">'
+gmG("startG('tense')",'⏰','زمان صحیح','یه فعل فارسی میبینی با زمانش (حال/گذشته/آینده). شکل درست انگلیسی رو انتخاب کن')
+gmG("startG('qword')",'❓','کلمه سوالی','یه جمله سوالی میبینی. کلمه سوالی درست (Who, What, Where...) رو انتخاب کن')
+gmG("startG('opposite')",'↔️','متضادها','یه کلمه میبینی. باید متضادش رو پیدا کنی. مثلا big ↔ small')
+gmG("startG('prep')",'📍','حرف اضافه','یه جمله میبینی. باید حرف اضافه درست رو انتخاب کنی (in, on, under...)')
+gmG("startG('grammar')",'📖','دستور زبان','یه جمله ناقص میبینی. کلمه گرامری درست رو انتخاب کن')
+gmG("startG('phrase')",'💬','معنی عبارت','یه عبارت انگلیسی میبینی. معنی فارسیش رو انتخاب کن')
+gmG("startG('fill')",'📝','جای خالی','یه جمله با ___ میبینی. کلمه درست رو انتخاب کن')
+gmG("startG('odd')",'🎯','نامربوط','چهار کلمه میبینی. اونی که به بقیه ربطی نداره رو پیدا کن')
+gmG("startG('spelling')",'✏️','هجی','معنی فارسی میبینی. املای درست انگلیسی رو انتخاب کن')
+gmG("startG('listen')",'🎧','گوش بده','یه کلمه برات خونده میشه. باید از بین گزینه‌ها درستشو انتخاب کنی')
+gmG("startG('missing')",'🔤','حرف جاافتاده','یه کلمه با حرف ناقص. بگو کدوم حرف کمه')
+gmG("startG('scramble')",'🔀','حروف درهم','حروف یه کلمه قاطی شدن. بگو کلمه درست کدومه')
+gmG("startG('quick')",'⚡','سرعتی','یه ایموجی فارسی میبینی. سریع انگلیسیشو انتخاب کن')
+gmG("startG('category')",'📦','دسته‌بندی','ببین کدوم کلمه به اون دسته مربوطه')
+'<div class="pc" onclick="startMem()"><div class="pi" style="background:#E8F4F0">🧠</div><div class="pinf"><h3>حافظه</h3><p>کارت‌ها رو برگردون و جفت پیدا کن</p></div><div class="gm-desc">کارت‌ها رو لمس کن. جفت انگلیسی-فارسی پیدا کن!</div></div></div>'}
function gmG(c,ico,t,desc){return'<div class="pc" onclick="'+c+'"><div class="pi" style="background:var(--pl)">'+ico+'</div><div class="pinf"><h3>'+t+'</h3></div><div class="gm-desc">'+desc+'</div></div>'}

function startG(mode){var cnt=10,qs=[];
if(mode==='tense'){var pool=shuf(TENSES).slice(0,cnt);for(var i=0;i<pool.length;i++){var t=pool[i],ri=Math.floor(Math.random()*3),forms=[t.v,t.p,t.f],labels=['Present حال','Past گذشته','Future آینده'];qs.push(mkQ(t.fa+' ('+labels[ri]+')',forms,forms[ri]))}}
else if(mode==='qword'){var pool=shuf(QWORDS).slice(0,cnt);for(var i=0;i<pool.length;i++){var qw=pool[i],opts=[qw.w];while(opts.length<4){var r=QWORDS[Math.floor(Math.random()*QWORDS.length)].w;if(opts.indexOf(r)<0)opts.push(r)}qs.push(mkQ(qw.ex+' ('+qw.fa+')',opts,qw.w))}}
else if(mode==='opposite'){var pool=shuf(OPP).slice(0,cnt);for(var i=0;i<pool.length;i++){var op=pool[i],isF=Math.random()>.5,qW=isF?op.a:op.b,ans=isF?op.b:op.a,opts=[ans];while(opts.length<4){var r=OPP[Math.floor(Math.random()*OPP.length)],w=Math.random()>.5?r.a:r.b;if(opts.indexOf(w)<0&&w!==qW)opts.push(w)}qs.push(mkQ('('+qW+') → متضاد؟',opts,ans))}}
else if(mode==='prep'){var allP=['in','on','under','behind','next to','between','in front of','above','near'];var pool=shuf(PREPS).slice(0,cnt);for(var i=0;i<pool.length;i++){qs.push(mkQ(pool[i].d,allP.slice(),pool[i].w))}}
else if(mode==='grammar'){var items=[{q:'___ apple',o:['an','a','the'],c:0},{q:'I ___ swim.',o:['can','is','are'],c:0},{q:'baby → ?',o:['babies','babys','babyes'],c:0},{q:'He ___ a car.',o:['has','have','is'],c:0},{q:'man → ?',o:['men','mans','mens'],c:0},{q:'child → ?',o:['children','childs','childes'],c:0},{q:'He is ___ than me.',o:['taller','tallest','more tall'],c:0},{q:'She ___ reading.',o:['is','are','am'],c:0},{q:'I ___ already done.',o:['have','has','had'],c:0},{q:'foot → ?',o:['feet','foots','feets'],c:0},{q:'tooth → ?',o:['teeth','tooths','teeths'],c:0},{q:'She ___ not eat meat.',o:['does','do','is'],c:0}];items=shuf(items).slice(0,cnt);for(var i=0;i<items.length;i++)qs.push({q:items[i].q,opts:items[i].o,ci:items[i].c})}
else if(mode==='phrase'){var pool=shuf(PHRASES).slice(0,cnt);for(var i=0;i<pool.length;i++){var ph=pool[i],opts=[ph.fa];while(opts.length<4){var r=PHRASES[Math.floor(Math.random()*PHRASES.length)].fa;if(opts.indexOf(r)<0)opts.push(r)}qs.push(mkQ(ph.en,opts,ph.fa))}}
else if(mode==='fill'){var pool=shuf(FILLB).slice(0,cnt);for(var i=0;i<pool.length;i++){qs.push(mkQ(pool[i].s,pool[i].o,pool[i].a))}}
else if(mode==='odd'){var pool=shuf(ODDO).slice(0,cnt);for(var i=0;i<pool.length;i++){qs.push({q:'کدوم ربطی نداره؟',opts:pool[i].w,ci:pool[i].a})}}
else if(mode==='spelling'){var pool=shuf(SPELLW).slice(0,cnt);for(var i=0;i<pool.length;i++){var sw=pool[i],opts=[sw.w];while(opts.length<4){var r=SPELLW[Math.floor(Math.random()*SPELLW.length)].w;if(opts.indexOf(r)<0)opts.push(r)}qs.push(mkQ(sw.fa,opts,sw.w))}}
else if(mode==='listen'){var pool=shuf(SPELLW).slice(0,cnt);for(var i=0;i<pool.length;i++){var w=pool[i],opts=[w.w];while(opts.length<4){var r=SPELLW[Math.floor(Math.random()*SPELLW.length)].w;if(opts.indexOf(r)<0)opts.push(r)}var q=mkQ('🎧 گوش بده! '+w.fa,opts,w.w);q.spk=w.w;qs.push(q)}}
else if(mode==='missing'){var pool=shuf(SPELLW).slice(0,cnt);for(var i=0;i<pool.length;i++){var w=pool[i],idx=Math.floor(Math.random()*w.w.length),ch=w.w[idx],disp=w.w.substring(0,idx)+'__'+w.w.substring(idx+1),opts=[ch],abc='abcdefghijklmnopqrstuvwxyz';while(opts.length<4){var r=abc[Math.floor(Math.random()*abc.length)];if(opts.indexOf(r)<0)opts.push(r)}qs.push(mkQ(disp+' ('+w.fa+')',opts,ch))}}
else if(mode==='scramble'){var pool=shuf(SPELLW).slice(0,cnt);for(var i=0;i<pool.length;i++){var w=pool[i],opts=[w.w];while(opts.length<4){var r=SPELLW[Math.floor(Math.random()*SPELLW.length)].w;if(opts.indexOf(r)<0)opts.push(r)}qs.push(mkQ(w.fa+' — حروف: '+shuf(w.w.split('')).join('').toUpperCase(),opts,w.w))}}
else if(mode==='quick'){var allWords=[];for(var ci=0;ci<3&&ci<VOCAB.length;ci++)for(var wi=0;wi<VOCAB[ci].words.length;wi++)allWords.push(VOCAB[ci].words[wi]);var pool=shuf(allWords).slice(0,cnt);for(var i=0;i<pool.length;i++){var w=pool[i],opts=[w.en];while(opts.length<4){var cat=VOCAB[Math.floor(Math.random()*VOCAB.length)],rw=cat.words[Math.floor(Math.random()*cat.words.length)];if(opts.indexOf(rw.en)<0)opts.push(rw.en)}qs.push(mkQ(w.e+' '+w.fa,opts,w.en))}}
else if(mode==='category'){var cats=[{name:'حیوانات 🐾',words:['cat','dog','elephant','lion','fish']},{name:'غذا 🍎',words:['apple','banana','bread','rice','cake']},{name:'رنگ 🎨',words:['red','blue','green','yellow','pink']}];for(var i=0;i<cnt;i++){var ci2=i%cats.length,cat=cats[ci2],w=cat.words[Math.floor(Math.random()*cat.words.length)],opts=[cat.name];while(opts.length<3){var rc=cats[Math.floor(Math.random()*cats.length)];if(opts.indexOf(rc.name)<0)opts.push(rc.name)}qs.push(mkQ(w+' — کدوم دسته؟',opts,cat.name))}}
S.qS={mode:mode,qs:qs,qi:0,sc:0,ans:[],lock:false};S.gView='q';render()}

function rQQ(){var ss=S.qS;if(!ss)return'';if(ss.qi>=ss.qs.length)return rShowR();var q=ss.qs[ss.qi],dots='';for(var i=0;i<ss.qs.length;i++){var c='spd';if(i===ss.qi)c+=' cur';else if(i<ss.qi)c+=ss.ans[i]?' ok2':' fl';dots+='<div class="'+c+'"></div>'}
if(q.spk&&!q.spoken){q.spoken=true;setTimeout(function(){speak(q.spk)},300)}
var oh='';for(var i=0;i<q.opts.length;i++)oh+='<button class="spopt" data-i="'+i+'" onclick="ansQ('+i+')">'+q.opts[i]+'</button>';
return'<div class="sptb"><button class="btn bs sm" onclick="cancelQ()">←</button><span style="font-size:.72rem;color:var(--tl)">'+(ss.qi+1)+'/'+ss.qs.length+'</span></div>'
+'<div class="spc"><div class="spprog">'+dots+'</div><div style="font-size:1.5rem;margin-bottom:6px">❓</div><div style="font-size:.95rem;font-weight:800;color:var(--pd);margin-bottom:8px;direction:rtl">'+q.q+'</div><div class="spopts">'+oh+'</div></div>'}
function ansQ(idx){var ss=S.qS;if(!ss||ss.lock)return;ss.lock=true;var q=ss.qs[ss.qi],ok=idx===q.ci;ss.ans.push(ok);if(ok){ss.sc++;addS(1)}
var btns=document.querySelectorAll('.spopt');for(var i=0;i<btns.length;i++){var bi=parseInt(btns[i].getAttribute('data-i'));btns[i].classList.add('dis');if(bi===q.ci)btns[i].classList.add('ok');if(bi===idx&&!ok)btns[i].classList.add('bad')}
setTimeout(function(){ss.qi++;ss.lock=false;render()},1200)}
function rShowR(){var ss=S.qS;if(!ss)return'';var sc=ss.sc,total=ss.qs.length,pct=Math.round(sc/total*100);S.lR={mode:ss.mode,score:sc,total:total,pct:pct};S.qS=null;S.gView='r';return rRes()}
function rRes(){var r=S.lR;if(!r)return'';var t=r.pct>=90?'عالی بود!':r.pct>=70?'آفرین!':r.pct>=50?'خوبه!':'بازم تلاش کن!';
return'<div class="result-card"><div style="font-size:3rem;margin-bottom:8px">'+(r.pct>=90?'🏆':r.pct>=70?'⭐':'💪')+'</div><h3>'+t+'</h3><p>'+r.score+' از '+r.total+' ('+r.pct+'%)</p><div class="nb"><button class="btn bp bl" style="flex:1" onclick="S.gView=\'menu\';render()">بازگشت</button></div></div>'}
function cancelQ(){S.qS=null;S.lR=null;S.gView='menu';render()}

/* MEMORY */
var memC=[],memF=[],memM=[];
function startMem(){var pairs=[];var pool=shuf(TENSES).slice(0,6);for(var i=0;i<pool.length;i++){pairs.push({id:i,type:'en',text:pool[i].v});pairs.push({id:i,type:'fa',text:pool[i].fa})}memC=shuf(pairs);memF=[];memM=[];S.gView='mem';render()}
function rMem(){var h='<div class="sptb"><button class="btn bs sm" onclick="S.gView=\'menu\';render()">←</button><span style="font-size:.72rem;color:var(--tl)">جفت: '+(memM.length/2)+'/'+(memC.length/2)+'</span></div>'
+'<div class="pc-detail" style="text-align:center"><div style="font-size:1.5rem;margin-bottom:8px">🧠</div><div style="font-size:.88rem;font-weight:800;color:var(--pd);margin-bottom:12px">کارت‌های جفت رو پیدا کن!</div><div class="mem-grid">';
for(var i=0;i<memC.length;i++){var c=memC[i],show=memF.indexOf(i)>=0||memM.indexOf(i)>=0,done=memM.indexOf(i)>=0;
h+='<div class="mem-card '+(show?'flipped':'')+' '+(done?'matched':'')+'" onclick="memFlip('+i+')">'+(show?c.text:'?')+'</div>'}
h+='</div></div>';document.getElementById('mc').innerHTML=h;uS()}
function memFlip(i){if(memF.length>=2||memF.indexOf(i)>=0||memM.indexOf(i)>=0)return;memF.push(i);rMem();
if(memF.length===2){var a=memF[0],b=memF[1];
if(memC[a].id===memC[b].id&&memC[a].type!==memC[b].type){memM.push(a,b);addS(1);memF=[];
if(memM.length===memC.length){addS(5);setTimeout(function(){S.lR={mode:'memory',score:memC.length/2,total:memC.length/2,pct:100};S.gView='r';render()},800)}else rMem()}
else{setTimeout(function(){memF=[];rMem()},1000)}}}

/* INIT */
document.getElementById('ro').addEventListener('click',function(e){if(e.target.id==='ro')document.getElementById('ro').classList.remove('show')});
document.addEventListener('touchstart',function(){try{speechSynthesis.speak(new SpeechSynthesisUtterance(''))}catch(e){}},{once:true});
render();uNav();uB();
</script>
