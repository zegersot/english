
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Phonics Land — یادگیری خواندن انگلیسی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FDF6EC;--surface:#FFFFFF;--primary:#3D7B6F;--primary-light:#E8F4F0;
  --primary-dark:#2B5A50;--accent:#E8856C;--accent-light:#FDF0EC;
  --gold:#D4A650;--gold-light:#FDF6E3;--text:#2D2926;--text-mid:#5A524C;
  --text-light:#8A837D;--success:#6BAF7E;--success-light:#EDF7EF;
  --danger:#D96B6B;--radius:16px;--radius-sm:10px;--radius-lg:24px;
  --shadow:0 2px 12px rgba(45,41,38,0.08);
  --shadow-lg:0 8px 32px rgba(45,41,38,0.12);
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;flex-direction:column;max-width:900px;margin:0 auto}
.app-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid rgba(0,0,0,0.05);position:sticky;top:0;z-index:100}
.app-header h1{font-size:1.15rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-btn{background:var(--primary-light);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition);font-size:1.15rem;color:var(--primary)}
.hdr-btn:hover{background:var(--primary);color:#fff}
.main-content{flex:1;padding:16px 16px 110px}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
.screen{display:none;animation:fadeIn .4s ease}.screen.active{display:block}
.section-title{font-size:1.2rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.btn{padding:13px 24px;border-radius:var(--radius-sm);border:none;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;gap:8px}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff;flex:1;justify-content:center}
.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--primary-light);color:var(--primary);flex:1;justify-content:center}
.btn-accent{background:var(--accent);color:#fff;flex:1;justify-content:center}
.btn-gold{background:var(--gold);color:#fff;flex:1;justify-content:center}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary);flex:1;justify-content:center}
.btn-large{padding:16px 32px;font-size:1.05rem;border-radius:var(--radius)}

/* HOME */
.home-hero{text-align:center;padding:36px 20px;background:linear-gradient(145deg,var(--primary-light),var(--accent-light));border-radius:var(--radius-lg);margin-bottom:28px;animation:slideUp .6s ease}
.home-hero .emoji-big{font-size:3.5rem;margin-bottom:10px;display:block}
.home-hero h2{font-size:1.6rem;font-weight:900;margin-bottom:6px;color:var(--primary-dark)}
.home-hero p{font-size:.95rem;color:var(--text-mid);line-height:1.6}
.tip-bar{display:inline-flex;align-items:center;gap:6px;background:var(--gold-light);color:var(--gold);padding:6px 14px;border-radius:20px;font-size:.82rem;font-weight:700;margin-bottom:20px}
.phase-grid{display:grid;gap:14px}
.phase-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:14px;border:2px solid transparent;animation:slideUp .5s ease both}
.phase-card:nth-child(2){animation-delay:.05s}.phase-card:nth-child(3){animation-delay:.1s}.phase-card:nth-child(4){animation-delay:.15s}
.phase-card:nth-child(5){animation-delay:.2s}.phase-card:nth-child(6){animation-delay:.25s}.phase-card:nth-child(7){animation-delay:.3s}.phase-card:nth-child(8){animation-delay:.35s}
.phase-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--primary-light)}
.phase-card:active{transform:scale(.98)}
.phase-icon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.phase-info{flex:1;min-width:0}
.phase-info h3{font-size:1rem;font-weight:800;margin-bottom:3px}
.phase-info p{font-size:.78rem;color:var(--text-light)}
.phase-bar{width:100%;height:5px;background:#eee;border-radius:3px;margin-top:6px;overflow:hidden}
.phase-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.phase-badge{font-size:.65rem;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap}

/* SOUND GRID */
.sound-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;margin-bottom:28px}
.sound-card{background:var(--surface);border-radius:var(--radius);padding:14px 6px;text-align:center;cursor:pointer;box-shadow:var(--shadow);transition:var(--transition);border:2px solid transparent;position:relative;animation:popIn .3s ease both}
.sound-card:active{transform:scale(.93)}
.sound-card:hover{border-color:var(--primary)}
.sound-card .letter{font-size:2rem;font-weight:900;color:var(--primary);line-height:1}
.sound-card .letter-upper{font-size:.75rem;color:var(--text-light);font-weight:600}
.sound-card .emoji{font-size:1.3rem;margin-top:3px}
.sound-card.done{border-color:var(--success);background:var(--success-light)}
.sound-card.done::after{content:'✓';position:absolute;top:3px;right:5px;color:var(--success);font-weight:800;font-size:.7rem}

/* SOUND DETAIL */
.sound-detail{text-align:center;animation:fadeIn .4s ease}
.sound-big{width:160px;height:160px;border-radius:50%;background:linear-gradient(145deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;cursor:pointer;transition:var(--transition);box-shadow:0 8px 28px rgba(61,123,111,.3);position:relative;animation:popIn .5s ease}
.sound-big:active{transform:scale(.93)}
.sound-big.playing{animation:bounce .6s ease}
.sound-big .letter-display{font-size:4.5rem;font-weight:900;color:#fff}
.sound-big .tap-hint{position:absolute;bottom:-8px;background:var(--gold);color:#fff;font-size:.65rem;padding:3px 12px;border-radius:20px;font-weight:700}
.letter-cases{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px}
.letter-box{background:var(--surface);border-radius:var(--radius-sm);padding:10px 18px;box-shadow:var(--shadow);font-size:1.4rem;font-weight:800;cursor:pointer;transition:var(--transition)}
.letter-box:active{transform:scale(.95);background:var(--primary-light)}
.letter-box span{display:block;font-size:.7rem;color:var(--text-light);font-weight:600;margin-top:2px}
.example-section{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:14px;text-align:right;direction:rtl}
.example-section h4{font-size:.85rem;color:var(--text-light);margin-bottom:10px;font-weight:700}
.example-word{display:inline-flex;align-items:center;gap:8px;background:var(--primary-light);padding:10px 20px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);font-size:1.2rem;font-weight:700;color:var(--primary-dark);direction:ltr}
.example-word:active{transform:scale(.95);background:var(--primary);color:#fff}
.example-word .ew-emoji{font-size:1.6rem}
.example-words-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;direction:ltr}
.more-words-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;direction:ltr}
.more-word-chip{background:var(--primary-light);color:var(--primary-dark);padding:6px 14px;border-radius:20px;font-size:.85rem;font-weight:700;cursor:pointer;transition:var(--transition)}
.more-word-chip:active{background:var(--primary);color:#fff}
.tip-box{background:var(--gold-light);border-radius:var(--radius-sm);padding:14px;margin-top:14px;font-size:.88rem;color:var(--text-mid);text-align:right;direction:rtl;line-height:1.7}
.nav-buttons{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}

/* WORD CARDS */
.word-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:10px;cursor:pointer;transition:var(--transition);animation:slideUp .4s ease both;border-left:4px solid var(--primary)}
.word-card:hover{box-shadow:var(--shadow-lg)}
.word-card:active{transform:scale(.98)}
.word-top{display:flex;align-items:center;justify-content:space-between}
.word-left{display:flex;align-items:center;gap:10px}
.word-emoji-big{font-size:2rem}
.word-text{font-size:1.4rem;font-weight:900;color:var(--text)}
.word-meaning{font-size:.8rem;color:var(--text-light);direction:rtl}
.word-sounds{display:flex;gap:4px;margin-top:8px}
.sound-chip{padding:4px 10px;border-radius:6px;font-weight:700;font-size:.85rem;cursor:pointer;transition:var(--transition)}
.sound-chip:active{transform:scale(1.1)}
.play-sm{background:var(--accent-light);color:var(--accent);border:none;padding:8px 16px;border-radius:20px;font-family:inherit;font-weight:700;cursor:pointer;transition:var(--transition);font-size:.85rem}
.play-sm:hover{background:var(--accent);color:#fff}

/* BLEND / SWIPE */
.swipe-area{display:flex;gap:6px;justify-content:center;padding:20px;background:var(--bg-warm,var(--bg));border-radius:var(--radius);margin-bottom:14px;touch-action:none;user-select:none;-webkit-user-select:none}
.swipe-letter{width:54px;height:64px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:900;color:var(--text);background:var(--surface);border:2px solid #eee;transition:all .15s ease}
.swipe-letter.highlight{background:var(--primary);color:#fff;border-color:var(--primary);transform:scale(1.12)}
.swipe-letter.done{background:var(--success);color:#fff;border-color:var(--success)}

/* TRICKY */
.tricky-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.tricky-card{background:var(--surface);border-radius:var(--radius);padding:16px 10px;text-align:center;cursor:pointer;box-shadow:var(--shadow);transition:var(--transition);border:2px solid transparent;animation:popIn .3s ease both}
.tricky-card:active{transform:scale(.93)}
.tricky-card:hover{border-color:var(--gold)}
.tricky-card .tw{font-size:1.3rem;font-weight:800;color:var(--accent)}
.tricky-card .tm{font-size:.7rem;color:var(--text-light);margin-top:3px;direction:rtl}
.tricky-card.learned{border-color:var(--success);background:var(--success-light)}

/* QUIZ */
.quiz-card{background:var(--surface);border-radius:var(--radius-lg);padding:28px 20px;box-shadow:var(--shadow-lg);text-align:center;animation:slideUp .5s ease}
.quiz-progress{display:flex;gap:5px;justify-content:center;margin-bottom:16px}
.quiz-dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:var(--transition)}
.quiz-dot.current{background:var(--primary);transform:scale(1.3)}
.quiz-dot.correct{background:var(--success)}.quiz-dot.wrong{background:var(--danger)}
.quiz-q{font-size:1.05rem;font-weight:700;margin-bottom:6px}
.quiz-sound-btn{width:90px;height:90px;border-radius:50%;background:linear-gradient(145deg,var(--primary),var(--primary-dark));border:none;color:#fff;font-size:1.8rem;cursor:pointer;margin:12px auto;display:flex;align-items:center;justify-content:center;transition:var(--transition);box-shadow:0 4px 14px rgba(61,123,111,.3)}
.quiz-sound-btn:active{transform:scale(.9)}
.quiz-sound-btn.playing{animation:pulse .5s ease}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.quiz-opt{padding:16px 14px;border-radius:var(--radius);border:2px solid #eee;background:var(--surface);font-family:inherit;font-size:1.1rem;font-weight:700;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
.quiz-opt:hover{border-color:var(--primary);background:var(--primary-light)}
.quiz-opt.correct{border-color:var(--success);background:var(--success-light);color:var(--success)}
.quiz-opt.wrong{border-color:var(--danger);background:#FDECEC;color:var(--danger)}
.quiz-opt.disabled{pointer-events:none}
.quiz-opt .qo-emoji{font-size:1.4rem}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:18px 10px;text-align:center;box-shadow:var(--shadow)}
.stat-num{font-size:1.8rem;font-weight:900;color:var(--primary)}
.stat-lbl{font-size:.7rem;color:var(--text-light);margin-top:3px}
.progress-list{display:grid;gap:10px}
.progress-item{background:var(--surface);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
.progress-item .pi-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.progress-item .pi-info{flex:1}
.progress-item .pi-info h4{font-size:.9rem;font-weight:700}
.progress-item .pi-bar{width:100%;height:5px;background:#eee;border-radius:3px;margin-top:5px;overflow:hidden}
.progress-item .pi-bar-fill{height:100%;border-radius:3px}
.progress-item .pi-pct{font-size:.75rem;color:var(--text-light);margin-top:2px}

/* SENTENCES */
.sentence-card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:12px;cursor:pointer;transition:var(--transition);animation:slideUp .4s ease both}
.sentence-card:active{transform:scale(.98)}
.sentence-emoji{font-size:2.5rem;text-align:center;margin-bottom:8px}
.sentence-text{font-size:1.3rem;font-weight:800;text-align:center;line-height:1.8;color:var(--text)}
.sentence-word{display:inline-block;padding:2px 4px;border-radius:4px;cursor:pointer;transition:var(--transition)}
.sentence-word:hover{background:var(--primary-light);color:var(--primary)}
.sentence-farsi{font-size:.85rem;color:var(--text-light);text-align:center;margin-top:8px;direction:rtl}

/* WORD FAMILIES */
.family-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;animation:slideUp .4s ease both}
.family-title{font-size:1.1rem;font-weight:800;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.family-words{display:flex;flex-wrap:wrap;gap:8px}
.family-word{background:var(--primary-light);color:var(--primary-dark);padding:8px 16px;border-radius:var(--radius-sm);font-weight:700;cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:6px}
.family-word:active{background:var(--primary);color:#fff}
.family-word .fw-emoji{font-size:1.2rem}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid rgba(0,0,0,.06);display:flex;justify-content:center;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:100}
.bottom-nav .nav-inner{display:flex;gap:2px;max-width:520px;width:100%;justify-content:space-around}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 8px;border-radius:12px;background:none;border:none;cursor:pointer;font-family:inherit;transition:var(--transition);color:var(--text-light);font-size:.6rem;font-weight:700;min-width:52px}
.nav-item .nav-icon{font-size:1.2rem}
.nav-item.active{color:var(--primary);background:var(--primary-light)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:28px 22px;max-width:380px;width:100%;text-align:center;animation:popIn .3s ease}
.modal h3{font-size:1.2rem;font-weight:800;margin-bottom:10px}
.modal p{color:var(--text-mid);margin-bottom:18px;line-height:1.6}
.modal .btn{width:100%}

/* RESPONSIVE */
@media(min-width:600px){
  .sound-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
  .quiz-opts{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:380px){
  .sound-grid{grid-template-columns:repeat(4,1fr);gap:7px}
  .sound-card .letter{font-size:1.6rem}
  .swipe-letter{width:44px;height:54px;font-size:1.5rem}
}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <button class="hdr-btn" id="backBtn" style="visibility:hidden" onclick="goBack()">←</button>
    <h1>📚 Phonics Land</h1>
    <button class="hdr-btn" id="soundToggle" onclick="toggleSound()">🔊</button>
  </header>
  <main class="main-content" id="mainContent"></main>
</div>
<div class="bottom-nav">
  <div class="nav-inner">
    <button class="nav-item active" onclick="navTo('home')" data-nav="home"><span class="nav-icon">🏠</span>خانه</button>
    <button class="nav-item" onclick="navTo('allSounds')" data-nav="allSounds"><span class="nav-icon">🔤</span>صداها</button>
    <button class="nav-item" onclick="navTo('wordFamilies')" data-nav="wordFamilies"><span class="nav-icon">📖</span>کلمات</button>
    <button class="nav-item" onclick="navTo('tricky')" data-nav="tricky"><span class="nav-icon">⭐</span>ویژه</button>
    <button class="nav-item" onclick="navTo('progress')" data-nav="progress"><span class="nav-icon">📊</span>پیشرفت</button>
    <button class="nav-item" ><a href="default.asp" target="_blank">Level 2</a></button>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

<script>
// ====================================================================
// COMPLETE PHONICS DATA
// ====================================================================
const PHONEMES = [
  {id:'s',lower:'s',upper:'S',word:'sun',emoji:'☀️',farsi:'خورشید',tip:'زبانت رو پشت دندونات بذار و هوا رو رد کن. صدای «سسس» مثل مار!',moreWords:[['snake','🐍'],['sock','🧦'],['sand','🏖️'],['sea','🌊'],['star','⭐'],['six','6️⃣']]},
  {id:'a',lower:'a',upper:'A',word:'apple',emoji:'🍎',farsi:'سیب',tip:'دهنت رو باز کن و صدای «اَ» بده. مثل وقتی دکتر میگی آآآ!',moreWords:[['ant','🐜'],['axe','🪓'],['arrow','🏹'],['add','➕'],['arm','💪'],['angel','😇']]},
  {id:'t',lower:'t',upper:'T',word:'tree',emoji:'🌳',farsi:'درخت',tip:'نوک زبانت رو پشت دندون بالا بزن و هوا رو آزاد کن. صدای «ت»!',moreWords:[['top','🔝'],['toy','🧸'],['tent','⛺'],['tiger','🐯'],['tail','🐾'],['turtle','🐢']]},
  {id:'p',lower:'p',upper:'P',word:'pig',emoji:'🐷',farsi:'خوک',tip:'لبات رو کامل ببند و بعد با یه فشار کوچولو بازشون کن. «پ»!',moreWords:[['pan','🍳'],['pen','🖊️'],['pot','🍲'],['panda','🐼'],['pizza','🍕'],['peach','🍑']]},
  {id:'i',lower:'i',upper:'I',word:'insect',emoji:'🐛',farsi:'حشره',tip:'دهنت رو کمی باز کن. صدای «ای» کوتاه. نه بلند! کوتاه!',moreWords:[['igloo','🧊'],['ink','🖋️'],['inside','🏠'],['ill','🤒'],['Indian','🇮🇳']]},
  {id:'n',lower:'n',upper:'N',word:'net',emoji:'🥅',farsi:'تور',tip:'نوک زبانت پشت دندونات باشه و صدا از بینیت بیاد. «ن»!',moreWords:[['nut','🥜'],['nose','👃'],['nest','🪹'],['nine','9️⃣'],['nap','😴'],['nail','🔩']]},

const state = {

  history: [],

  selectedSound: null,

const save = () => localStorage.setItem('pl_prog', JSON.stringify(state.progress));
const sDone = id => state.progress['s_'+id] || false;
const sMark = id => { state.progress['s_'+id] = true; save(); };
const wDone = w => state.progress['w_'+w] || false;
const wMark = w => { state.progress['w_'+w] = true; save(); };
const tDone = w => state.progress['t_'+w] || false;
const tMark = w => { state.progress['t_'+w] = true; save(); };
const quizGet = id => state.progress['q_'+id] ?? null;
const quizSave = (id, s) => { state.progress['q_'+id] = s; save(); };

// ====================================================================
// SPEECH (FIXED — uses demo words for reliable pronunciation)
// ====================================================================
let prefVoice = null;
function loadV() {
  const v = speechSynthesis.getVoices();
  prefVoice = v.find(x=>x.lang==='en-GB')||v.find(x=>x.lang.startsWith('en-GB'))||v.find(x=>x.lang==='en-US')||v.find(x=>x.lang.startsWith('en'))||null;
}
speechSynthesis.onvoiceschanged = loadV;
loadV();

function speak(text, rate=0.75, pitch=1) {
  if (!state.soundEnabled) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB'; u.rate = rate; u.pitch = pitch;
  if (prefVoice) u.voice = prefVoice;
  speechSynthesis.speak(u);
  return u;
}

// FIXED: For letter sounds, speak the WORD slowly (most reliable way)
function speakLetterSound(id) {
  const item = PHONEMES.find(p=>p.id===id) || DIGRAPHS.find(d=>d.id===id);
  if (!item) return;
  const phonemeMap={s:"s",a:"a",t:"t",p:"p",i:"i",n:"n",m:"m",d:"d",g:"g",o:"o",c:"c",k:"k",e:"e",u:"u",r:"r",h:"h",b:"b",f:"f",l:"l",j:"j",v:"v",w:"w",x:"x",y:"y",z:"z",ch:"ch",sh:"sh",th:"th",ng:"ng",ai:"ai",ee:"ee",igh:"igh",oa:"oa",oo:"oo",ar:"ar",or:"or",ur:"ur",ow:"ow",oi:"oi",ear:"ear",air:"air",ure:"ure",er:"er"};
  speak(phonemeMap[id]||item.id,0.55,0.9);
}

function speakWord(w) { speak(w, 0.7, 1); }
function speakWordSlow(w) { speak(w, 0.45, 1); }
function speakSentence(text) { speak(text, 0.6, 1); }

// ====================================================================
// NAVIGATION
// ====================================================================
function navTo(screen) {
  if (state.currentScreen !== screen) state.history.push(state.currentScreen);
  state.currentScreen = screen;
  render(); updateNav(); updateBack();
  window.scrollTo(0,0);
}
function goBack() {
  if (state.history.length) {
    state.currentScreen = state.history.pop();
    render(); updateNav(); updateBack();
  }
}
function updateNav() {
  const map = {
    home:['home'], allSounds:['allSounds','soundDetail'],
    wordFamilies:['wordFamilies','phaseWords','blendWord'],
    tricky:['tricky'], progress:['progress','quiz','quizResult','sentences']
  };
  document.querySelectorAll('.nav-item').forEach(el => {
    const n = el.dataset.nav;
    el.classList.toggle('active', (map[n]||[]).includes(state.currentScreen));
  });
}
function updateBack() {
  document.getElementById('backBtn').style.visibility = state.history.length ? 'visible' : 'hidden';
}
function toggleSound() {
  state.soundEnabled = !state.soundEnabled;
  document.getElementById('soundToggle').textContent = state.soundEnabled ? '🔊' : '🔇';
}
function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}
function hideModal() { document.getElementById('modalOverlay').classList.remove('show'); }

// ====================================================================
function render() {
  const mc = document.getElementById('mainContent');
  const r = {
    home: renderHome, allSounds: renderAllSounds, soundDetail: renderSoundDetail,
    wordFamilies: renderWordFamilies, phaseWords: renderPhaseWords, blendWord: renderBlendWord,
    tricky: renderTricky, quiz: renderQuiz, quizResult: renderQuizResult,
    progress: renderProgress, sentences: renderSentences,
  };
  mc.innerHTML = (r[state.currentScreen] || renderHome)();
  attachSwipe();
}

// ---- HOME ----

  const allS = PHONEMES.length + DIGRAPHS.length;
  const doneS = PHONEMES.filter(p=>sDone(p.id)).length + DIGRAPHS.filter(d=>sDone(d.id)).length;
  const allW = PHASES.filter(p=>p.words).reduce((a,p)=>a+p.words.length,0);
  const doneW = PHASES.filter(p=>p.words).reduce((a,p)=>a+p.words.filter(w=>wDone(w.w)).length,0);

  return `
    <div class="home-hero">
      <span class="emoji-big">📚✨</span>
      <h2>به Phonics Land خوش آمدید!</h2>
      <p>اینجا بچه‌ها یاد می‌گیرن انگلیسی بخونن<br>با صدای حروف، کلمات و تمرین</p>
    </div>
    <div class="tip-bar">👆 روی هر چیزی بزن تا صداش رو بشنوی!</div>
    <div class="section-title">📍 مراحل یادگیری</div>
    <div class="phase-grid">
      ${PHASES.map((ph,i) => {
        let total=0,done=0;
        if(ph.type==='sounds'){total=ph.items.length;done=ph.items.filter(id=>sDone(id)).length;}
        else if(ph.type==='words'){total=ph.words.length;done=ph.words.filter(w=>wDone(w.w)).length;}
        else if(ph.type==='tricky'){total=TRICKY_WORDS.length;done=TRICKY_WORDS.filter(w=>tDone(w.w)).length;}
        else if(ph.type==='families'){total=WORD_FAMILIES.reduce((a,f)=>a+f.words.length,0);done=0;}
        else if(ph.type==='sentences'){total=SIMPLE_SENTENCES.length;done=0;}
        const pct=total?Math.round(done/total*100):0;
        const badge=pct===100?'✓':pct>0?pct+'%':'شروع';
        const badgeBg=pct===100?'var(--success)':pct>0?ph.bg:'#f0f0f0';
        const badgeCol=pct===100?'#fff':ph.color;
        return `<div class="phase-card" onclick="selectPhase(${ph.id})" style="animation-delay:${i*0.04}s">
          <div class="phase-icon" style="background:${ph.bg};color:${ph.color}">${ph.icon}</div>
          <div class="phase-info">
            <h3>مرحله ${ph.id}: ${ph.title}</h3>
            <p>${ph.desc}</p>
            ${ph.type!=='families'&&ph.type!=='sentences'?`<div class="phase-bar"><div class="phase-bar-fill" style="width:${pct}%;background:${ph.color}"></div></div>`:''}
          </div>
          <span class="phase-badge" style="color:${badgeCol};background:${badgeBg}">${badge}</span>
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:28px">
      <div class="section-title">📊 خلاصه</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num">${doneS}/${allS}</div><div class="stat-lbl">صدا</div></div>
        <div class="stat-card"><div class="stat-num">${doneW}/${allW}</div><div class="stat-lbl">کلمه</div></div>
        <div class="stat-card"><div class="stat-num">${TRICKY_WORDS.filter(w=>tDone(w.w)).length}/${TRICKY_WORDS.length}</div><div class="stat-lbl">ویژه</div></div>
      </div>
    </div>`;
}

function selectPhase(id) {
  state.selectedPhase = PHASES.find(p=>p.id===id);
  const t = state.selectedPhase.type;
  if(t==='sounds') navTo('allSounds');
  else if(t==='words') navTo('phaseWords');
  else if(t==='tricky') navTo('tricky');
  else if(t==='families') navTo('wordFamilies');
  else if(t==='sentences') navTo('sentences');
}

// ---- ALL SOUNDS ----

  const items = state.selectedPhase && state.selectedPhase.type==='sounds' ? state.selectedPhase.items : PHONEMES.map(p=>p.id);

function pickSound(id) { state.selectedSound = id; navTo('soundDetail'); }

  const prev = idx>0?items[idx-1]:null;
  const next = idx<items.length-1?items[idx+1]:null;
  const done = sDone(id);

  // Find words from all phases containing this sound
  const allWords = PHASES.filter(p=>p.words).flatMap(p=>p.words);

function playSoundBig(id) {
  const el = document.getElementById('soundBig');
  if(el){el.classList.add('playing');setTimeout(()=>el.classList.remove('playing'),600);}
  speakLetterSound(id);
}

function markSound(id) {
  sMark(id);
  const items = state.selectedPhase && state.selectedPhase.type==='sounds' ? state.selectedPhase.items : PHONEMES.map(p=>p.id);
  const idx = items.indexOf(id);
  const next = idx<items.length-1?items[idx+1]:null;
  if(next) pickSound(next); else navTo('allSounds');
}

      <div class="nav-buttons">
        ${prev?`<button class="btn btn-secondary" onclick="pickWord('${prev.w}')">← قبلی</button>`:''}
        ${!done?`<button class="btn btn-primary" onclick="markWord('${wo.w}')">✓ یاد گرفتم!</button>`:`<button class="btn btn-gold" style="flex:1;justify-content:center">✓ یاد گرفته شده</button>`}
        ${next?`<button class="btn btn-secondary" onclick="pickWord('${next.w}')">بعدی →</button>`:''}
      </div>
    </div>`;
}

function markWord(w) {
  wMark(w);
  const ph = state.selectedPhase;
  if(!ph||!ph.words){navTo('phaseWords');return;}
  const idx = ph.words.findIndex(x=>x.w===w);
  const next = idx<ph.words.length-1?ph.words[idx+1]:null;
  if(next) pickWord(next.w);
  else {
    showModal(`<h3>🎉 آفرین!</h3><p>همه کلمات این مرحله رو تمرین کردی!<br>میخوای آزمون بدی؟</p>
      <div style="display:grid;gap:10px;margin-top:14px">
        <button class="btn btn-primary btn-large" onclick="hideModal();startQuiz(${ph.id})">📝 آزمون!</button>
        <button class="btn btn-secondary" onclick="hideModal();navTo('phaseWords')">برگشت</button>
      </div>`);
  }
}

// ---- QUIZ ----
function startQuiz(phaseId) {
  const ph = PHASES.find(p=>p.id===phaseId);
  if(!ph) return;
  state.selectedPhase = ph;
  const qs = genQuiz(ph);
  state.quizState = {phaseId, questions:qs, currentQ:0, answers:[], score:0};
  navTo('quiz');
}

function genQuiz(ph) {
  const qs = [];
  const allS = [...PHONEMES,...DIGRAPHS];

  if(ph.type==='sounds') {
    const items = ph.items;
    // Type 1: hear word → pick the starting letter
    const picked = [...items].sort(()=>Math.random()-.5).slice(0,4);
    for(const id of picked) {
      const item = allS.find(s=>s.id===id);
      if(!item) continue;
      const opts=[item.word];
      const others = allS.filter(s=>s.id!==id).sort(()=>Math.random()-.5).slice(0,3);
      others.forEach(o=>opts.push(o.word));
      qs.push({type:'hearWord',question:'کدوم کلمه با این صدا شروع میشه؟',playWord:item.word,display:item.lower||item.display,
        options:opts.sort(()=>Math.random()-.5),answer:item.word});
    }
    // Type 2: see letter → pick word that starts with it
    const picked2 = [...items].sort(()=>Math.random()-.5).slice(0,3);
    for(const id of picked2) {
      const item = allS.find(s=>s.id===id);
      if(!item) continue;
      const opts=[item.word];
      const others = allS.filter(s=>s.id!==id).sort(()=>Math.random()-.5).slice(0,3);
      others.forEach(o=>opts.push(o.word));
      qs.push({type:'letterMatch',question:'کدوم کلمه با حرف زیر شروع میشه؟',letter:item.lower||item.display,
        options:opts.sort(()=>Math.random()-.5),answer:item.word,emoji:item.emoji});
    }
  } else if(ph.type==='words'&&ph.words) {
    const picked = [...ph.words].sort(()=>Math.random()-.5).slice(0,4);
    for(const wo of picked) {
      const opts=[wo.w];
      ph.words.filter(w=>w.w!==wo.w).sort(()=>Math.random()-.5).slice(0,3).forEach(o=>opts.push(o.w));
      qs.push({type:'hearWord',question:'کدوم کلمه رو میشنوی؟',playWord:wo.w,display:'🔊',
        options:opts.sort(()=>Math.random()-.5),answer:wo.w});
    }
    // Type: emoji → word
    const picked2 = [...ph.words].sort(()=>Math.random()-.5).slice(0,3);
    for(const wo of picked2) {
      if(!wo.e) continue;
      const opts=[wo.w];
      ph.words.filter(w=>w.w!==wo.w&&w.e).sort(()=>Math.random()-.5).slice(0,3).forEach(o=>opts.push(o.w));
      qs.push({type:'emojiMatch',question:'این شکلک چیه؟',emoji:wo.e,
        options:opts.sort(()=>Math.random()-.5),answer:wo.w});
    }
    // Type: blend
    const picked3 = [...ph.words].sort(()=>Math.random()-.5).slice(0,2);
    for(const wo of picked3) {
      const opts=[wo.w];
      ph.words.filter(w=>w.w!==wo.w).sort(()=>Math.random()-.5).slice(0,3).forEach(o=>opts.push(o.w));
      qs.push({type:'blend',question:'این صداها چه کلمه‌ای میسازن؟',sounds:wo.s,
        options:opts.sort(()=>Math.random()-.5),answer:wo.w,e:wo.e,m:wo.m});
    }
  }
  return qs.slice(0,10);
}

function renderQuiz() {
  const qs = state.quizState;
  if(!qs) return '';
  if(qs.currentQ>=qs.questions.length) { state.currentScreen='quizResult'; return renderQuizResult(); }
  const q = qs.questions[qs.currentQ];
  const dots = qs.questions.map((_,i)=>{
    let c='quiz-dot';
    if(i===qs.currentQ) c+=' current';
    else if(i<qs.currentQ) c+=qs.answers[i]?' correct':' wrong';
    return `<div class="${c}"></div>`;
  }).join('');

  let main = '';
  if(q.type==='hearWord'||q.type==='emojiMatch') {
    main = q.type==='emojiMatch' ? `<div style="font-size:4rem;margin:12px 0">${q.emoji}</div>` :
      `<button class="quiz-sound-btn" onclick="this.classList.add('playing');setTimeout(()=>this.classList.remove('playing'),500);speakWord('${q.playWord}')">🔊</button>
       <div style="font-size:.8rem;color:var(--text-light);margin-bottom:8px">برای شنیدن بزن</div>`;
  } else if(q.type==='letterMatch') {
    main = `<div style="font-size:4rem;font-weight:900;color:var(--primary);margin:12px 0">${q.letter}</div>`;
  } else if(q.type==='blend') {
    main = `<div style="display:flex;gap:5px;justify-content:center;margin:12px 0;flex-wrap:wrap">
      ${q.sounds.map(s=>`<span style="background:var(--primary-light);color:var(--primary);padding:8px 14px;border-radius:8px;font-weight:800;font-size:1.2rem">${s}</span>`).join('')}
    </div>
    <button class="play-sm" onclick="speakWord('${q.answer}')" style="margin-bottom:8px">🔊 گوش بده</button>
    ${q.e?`<div style="font-size:2rem;margin:4px 0">${q.e}</div>`:''}`;
  }

  return `
    <div class="quiz-card">
      <div class="quiz-progress">${dots}</div>
      <div style="font-size:.8rem;color:var(--text-light);margin-bottom:6px">سوال ${qs.currentQ+1} از ${qs.questions.length}</div>
      <div class="quiz-q">${q.question}</div>
      ${main}
      <div class="quiz-opts">
        ${q.options.map(opt=>`<button class="quiz-opt" onclick="ansQuiz(this,'${opt}','${q.answer}')">${opt}</button>`).join('')}
      </div>
    </div>`;
}

function ansQuiz(btn, sel, correct) {
  const qs = state.quizState;
  if(!qs) return;
  const ok = sel===correct;
  qs.answers.push(ok);
  if(ok) qs.score++;
  document.querySelectorAll('.quiz-opt').forEach(el=>{
    el.classList.add('disabled');
    if(el.textContent.trim()===correct) el.classList.add('correct');
    if(el.textContent.trim()===sel&&!ok) el.classList.add('wrong');
  });
  if(ok) speak('Good job!',0.8,1.2); else speak(correct,0.55,1);
  setTimeout(()=>{ qs.currentQ++; render(); },1400);
}

function renderQuizResult() {
  const qs = state.quizState;
  if(!qs) return '';
  quizSave(qs.phaseId, qs.score);
  const pct = Math.round(qs.score/qs.questions.length*100);
  let emoji,text;
  if(pct>=90){emoji='🌟';text='عالی! فوق‌العاده‌ای!';}
  else if(pct>=70){emoji='🎉';text='خیلی خوب بود!';}
  else if(pct>=50){emoji='👍';text='خوبه! ادامه بده!';}
  else{emoji='💪';text='بیشتر تمرین کن!';}
  return `<div class="quiz-card">
    <div style="font-size:3.5rem;margin-bottom:8px;animation:bounce .6s ease">${emoji}</div>
    <div style="font-size:1.2rem;font-weight:800;margin-bottom:6px">${text}</div>
    <div style="font-size:1rem;color:var(--text-mid)">${qs.score} از ${qs.questions.length} درست (${pct}%)</div>
    <div class="nav-buttons" style="margin-top:20px">
      <button class="btn btn-primary btn-large" style="flex:1" onclick="startQuiz(${qs.phaseId})">🔄 دوباره</button>
      <button class="btn btn-secondary btn-large" style="flex:1" onclick="navTo('home')">🏠 خانه</button>
    </div>
  </div>`;
}

// ---- PROGRESS ----
function renderProgress() {
  const allS=PHONEMES.length+DIGRAPHS.length;
  const doneS=PHONEMES.filter(p=>sDone(p.id)).length+DIGRAPHS.filter(d=>sDone(d.id)).length;
  const allW=PHASES.filter(p=>p.words).reduce((a,p)=>a+p.words.length,0);
  const doneW=PHASES.filter(p=>p.words).reduce((a,p)=>a+p.words.filter(w=>wDone(w.w)).length,0);
  const doneT=TRICKY_WORDS.filter(w=>tDone(w.w)).length;

  return `
    <div class="section-title">📊 پیشرفت</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${doneS}</div><div class="stat-lbl">صدا از ${allS}</div></div>
      <div class="stat-card"><div class="stat-num">${doneW}</div><div class="stat-lbl">کلمه از ${allW}</div></div>
      <div class="stat-card"><div class="stat-num">${doneT}</div><div class="stat-lbl">ویژه از ${TRICKY_WORDS.length}</div></div>
    </div>
    <div class="section-title" style="font-size:1rem">📈 هر مرحله</div>
    <div class="progress-list">
      ${PHASES.map(ph=>{
        let total=0,done=0;
        if(ph.type==='sounds'){total=ph.items.length;done=ph.items.filter(id=>sDone(id)).length;}
        else if(ph.type==='words'){total=ph.words?ph.words.length:0;done=ph.words?ph.words.filter(w=>wDone(w.w)).length:0;}
        else if(ph.type==='tricky'){total=TRICKY_WORDS.length;done=TRICKY_WORDS.filter(w=>tDone(w.w)).length;}
        else return '';
        const pct=total?Math.round(done/total*100):0;
        const q=quizGet(ph.id);
        return `<div class="progress-item">
          <div class="pi-icon" style="background:${ph.bg};color:${ph.color}">${ph.icon}</div>
          <div class="pi-info">
            <h4>مرحله ${ph.id}: ${ph.title}</h4>
            <div class="pi-bar"><div class="pi-bar-fill" style="width:${pct}%;background:${ph.color}"></div></div>
            <div class="pi-pct">${done}/${total} (${pct}%) ${q!==null?`| آزمون: ${q}`:''}</div>
          </div>
          ${ph.type!=='tricky'?`<button class="btn" style="padding:8px 12px;font-size:.8rem;background:${ph.bg};color:${ph.color};border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700" onclick="startQuiz(${ph.id})">📝</button>`:''}
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:28px;text-align:center">
      <button class="btn btn-outline" onclick="showModal('<h3>⚠️ ریست</h3><p>همه پیشرفت‌ها پاک بشن؟</p><div style=\\'display:grid;gap:10px;margin-top:14px\\'><button class=\\'btn btn-accent btn-large\\' onclick=\\'resetProg()\\'>بله</button><button class=\\'btn btn-secondary\\' onclick=\\'hideModal()\\'>نه</button></div>')">🔄 ریست</button>
    </div>`;
}
function resetProg(){state.progress={};save();hideModal();navTo('home');}

// ====================================================================
// SWIPE HANDLER
// ====================================================================
function attachSwipe() {
  document.querySelectorAll('.swipe-area').forEach(el => {
    let active=false, played=new Set();
    const letters=el.querySelectorAll('.swipe-letter');
    const word=el.dataset.word;
    function handle(e) {
      const t=e.touches?e.touches[0]:e;
      const target=document.elementFromPoint(t.clientX,t.clientY);
      if(target&&target.classList.contains('swipe-letter')) {
        const idx=parseInt(target.dataset.index);
        if(!played.has(idx)) {
          played.add(idx);
          target.classList.add('highlight');
          speakLetterSound(target.dataset.sound);
          setTimeout(()=>{target.classList.remove('highlight');target.classList.add('done');},350);
        }
        if(played.size===letters.length) setTimeout(()=>speakWord(word),400);
      }
    }
    el.addEventListener('touchstart',e=>{active=true;played.clear();handle(e);},{passive:true});
    el.addEventListener('touchmove',e=>{if(active)handle(e);},{passive:true});
    el.addEventListener('touchend',()=>{active=false;});
    el.addEventListener('mousedown',e=>{active=true;played.clear();handle(e);});
    el.addEventListener('mousemove',e=>{if(active)handle(e);});
    el.addEventListener('mouseup',()=>{active=false;});
    el.addEventListener('mouseleave',()=>{active=false;});
  });
}

document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target.id==='modalOverlay')hideModal();});
document.addEventListener('click',()=>{loadV();},{once:true});
